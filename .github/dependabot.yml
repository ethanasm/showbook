version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
    ignore:
      # ESLint 10 dropped `scopeManager.addGlobals`, which eslint-config-next
      # 16 and eslint-config-expo 55 still call. Re-enable once both config
      # packages ship ESLint-10-compatible releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # babel-preset-expo / eslint-config-expo majors track the Expo SDK
      # major. Bump them as part of an Expo SDK 55→56 migration PR, not
      # via dependabot — see PR #163 / #77 for the JS/native mismatch
      # post-mortems that drove the existing SDK 55 pin.
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-major"]
      # react / react-dom are pinned via pnpm.overrides in the root
      # package.json. Dependabot can't see the override block, so its
      # bumps land the override and the per-app dep on different
      # versions and pnpm --frozen-lockfile rejects the result with
      # ERR_PNPM_LOCKFILE_CONFIG_MISMATCH. Bump them manually together
      # with the override.
      - dependency-name: "react"
      - dependency-name: "react-dom"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
