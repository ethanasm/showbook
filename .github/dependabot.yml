version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      # react peer-checks an exact version match between react and
      # react-dom at startup ("Incompatible React versions" otherwise),
      # so they must bump together in a single PR.
      react:
        patterns:
          - "react"
          - "react-dom"
      # The Expo SDK is a tightly-coupled package set: every `expo-*` /
      # `@expo/*` runtime package compiles against the `expo-modules-core`
      # major that ships inside the matching `expo` host, and
      # `react-native` is pinned by the SDK release notes. Mixing
      # versions across an SDK boundary crashes native-module-registry
      # init with NoClassDefFoundError before any JS runs — what killed
      # every cold launch on 2026-05-29 after PRs #423 (expo-audio),
      # #424 (@expo/metro-runtime), #447 (linear-gradient), and #448
      # (expo-haptics) layered SDK 56 packages onto an SDK 55 host
      # (see #457 post-mortem). Bundle every SDK-coupled package into a
      # single dependabot PR so an SDK 55 -> 56 bump lands as one
      # coordinated change. babel-preset-expo / eslint-config-expo are
      # in the group too — their majors also track the SDK major and
      # need to move with `expo`.
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "babel-preset-expo"
          - "eslint-config-expo"
    ignore:
      # ESLint 10 dropped `scopeManager.addGlobals`, which eslint-config-next
      # 16 and eslint-config-expo 55 still call. Re-enable once both config
      # packages ship ESLint-10-compatible releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
