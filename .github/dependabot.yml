version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      # react peer-checks an exact version match between react and
      # react-dom at startup ("Incompatible React versions" otherwise),
      # so they must bump together in a single PR.
      react:
        patterns:
          - "react"
          - "react-dom"
    ignore:
      # ESLint 10 dropped `scopeManager.addGlobals`, which eslint-config-next
      # 16 and eslint-config-expo 55 still call. Re-enable once both config
      # packages ship ESLint-10-compatible releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # babel-preset-expo / eslint-config-expo majors track the Expo SDK
      # major. Bump them as part of an Expo SDK 55→56 migration PR, not
      # via dependabot — see PR #163 / #77 for the JS/native mismatch
      # post-mortems that drove the existing SDK 55 pin.
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-major"]
      # Every `expo-*` and `@expo/*` runtime package is coupled to the
      # host `expo` SDK major. Mixing SDK 56 packages into an SDK 55
      # host links against expo-modules-core 3.x while the runtime
      # ships expo-modules-core 2.x, which crashes native-module-
      # registry init with NoClassDefFoundError before any JS runs —
      # this is what killed every cold launch on 2026-05-29 after PRs
      # #423 (expo-audio), #424 (@expo/metro-runtime), #447 (linear-
      # gradient), and #448 (expo-haptics) layered SDK 56 packages on.
      # Hold majors for the SDK-bump PR. Minors/patches inside the
      # current SDK line are still fair game and continue to auto-PR.
      - dependency-name: "expo*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
