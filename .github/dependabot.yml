version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"
        # babel-preset-expo / eslint-config-expo are devDependencies, but
        # their majors track the Expo SDK major and MUST move with the
        # expo-sdk group (below). Dependabot assigns each dependency to the
        # FIRST group it matches in definition order, and this group is
        # defined first — so without this exclusion these two get pulled
        # into the dev-dependencies PR and bumped to the next SDK
        # independently of `expo` / `react-native` (exactly the partial
        # SDK-boundary split the expo-sdk group exists to prevent — it
        # shipped as #458 bumping both to SDK 56 on their own).
        exclude-patterns:
          - "babel-preset-expo"
          - "eslint-config-expo"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      # The Expo SDK is a tightly-coupled package set: every `expo-*` /
      # `@expo/*` runtime package compiles against the `expo-modules-core`
      # major that ships inside the matching `expo` host, and
      # `react-native` is pinned by the SDK release notes. Mixing
      # versions across an SDK boundary crashes native-module-registry
      # init with NoClassDefFoundError before any JS runs — what killed
      # every cold launch on 2026-05-29 after PRs #423 (expo-audio),
      # #424 (@expo/metro-runtime), #447 (linear-gradient), and #448
      # (expo-haptics) layered SDK 56 packages onto an SDK 55 host
      # (see #457 post-mortem). Bundle every SDK-coupled package into a
      # single dependabot PR so an SDK 55 -> 56 bump lands as one
      # coordinated change. babel-preset-expo / eslint-config-expo are
      # in the group too — their majors also track the SDK major and
      # need to move with `expo`.
      #
      # The `react-native-*` / `@react-native-community/*` /
      # `@react-native-masked-view/*` native modules are pinned per SDK
      # release in expo's bundledNativeModules.json (reanimated, worklets,
      # gesture-handler, safe-area-context, screens, svg, maps, web,
      # netinfo, masked-view, ...). They compile against the RN/SDK ABI,
      # so a bump in isolation lands an SDK-N module on an SDK-(N±1) host
      # and crashes native init — the same failure class as the expo-*
      # split. They previously leaked out as standalone PRs (#461
      # reanimated, #462 worklets) that died at `pnpm install
      # --frozen-lockfile` because the root package.json `pnpm.overrides`
      # pin them and dependabot can't edit overrides. The grouping keeps the
      # non-override-pinned ones (svg, maps, web, netinfo, masked-view)
      # moving with `expo`; the five that ARE override-pinned are additionally
      # `ignore`d below — grouping alone still produced failing, SDK-
      # overshooting PRs (#475: gesture-handler 3.0.0 / reanimated 4.4.0 on an
      # SDK-56 host). They move only via a manual `expo install --fix` SDK bump.
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "@react-native-community/*"
          - "@react-native-masked-view/*"
          - "babel-preset-expo"
          - "eslint-config-expo"
    ignore:
      # An Expo SDK major is a coordinated MANUAL upgrade (`expo install
      # --fix` + the root pnpm.overrides bump), never a dependabot PR. The
      # react-native host and the five override-pinned native modules are
      # ignore-listed below, so any SDK-major group PR dependabot raises
      # can only ever land HALF the upgrade: every expo-* package moves to
      # SDK N+1 while react-native stays on SDK N's pin. CI stays green
      # (nothing in ci.yml compiles native code) and the break only
      # surfaces in the mobile-e2e native Gradle build after merge —
      # exactly #650, which shipped expo-* at SDK 57 against RN 0.85.3 and
      # broke expo-modules-core's NativeArrayBuffer.cpp on the missing
      # RN-0.86 jsi::ArrayBuffer::tryGetMutableBuffer API (fixed by #656).
      # Blocking semver-major on every SDK-coupled package means the
      # expo-sdk group only raises within-SDK patch/minor updates; the SDK
      # boundary moves as one manual, natively-verified change. Wildcards:
      # `react-native-*` deliberately also catches the non-override-pinned
      # native modules (svg, maps, draggable-flatlist) — their majors are
      # SDK-blessed too — but not pure-JS `lucide-react-native` (prefix
      # doesn't match).
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@expo/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-native-community/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-native-masked-view/*"
        update-types: ["version-update:semver-major"]
      # ESLint 10 dropped `scopeManager.addGlobals`, which eslint-config-next
      # 16 and eslint-config-expo 55 still call. Re-enable once both config
      # packages ship ESLint-10-compatible releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Babel 8 is dead-on-arrival for the Expo SDK 56 / React Native 0.85
      # toolchain: babel-preset-expo, @babel/preset-typescript, and the
      # react-native-worklets babel plugin all `assertVersion("^7.0.0-0")`,
      # so a @babel/core 8.x throws `Requires Babel "^7.0.0-0", but was
      # loaded with "8.x"` the moment Metro transforms a file. CI's web/unit
      # jobs don't bundle the native app, so #621's 7.29.7 -> 8.0.1 bump
      # shipped green to `main` and only blew up the push-to-main Mobile E2E
      # Metro release bundle (`createBundleReleaseJsAndAssets`). Worse, the
      # optional `@babel/core` peer on `next` / `react-native` floats every
      # workspace up to the highest resolvable version, so a single 8.x in the
      # tree drags the whole monorepo onto Babel 8 — which is why @babel/core
      # is now hard-pinned to 7.29.7 in the root package.json `pnpm.overrides`.
      # Dependabot can't edit overrides, so (like the react-native pins above)
      # any bump it raises contradicts the exact override and dies at
      # `pnpm install --frozen-lockfile`. It moves only when the Expo SDK
      # adopts Babel 8 (manual override + this ignore bump together).
      - dependency-name: "@babel/core"
      # `react-native` itself is the SDK host ABI. It is hard-pinned in the
      # root package.json `pnpm.overrides` (introduced at 0.85.3 by #593;
      # currently 0.86.0 for SDK 57) AND every
      # native module below compiles against its exact minor. A standalone
      # bump is the worst class of break: #589's expo-sdk group dragged
      # `react-native` to 0.86.0, which (a) deletes the
      # `react-native/Libraries/Renderer/shims/ReactNative` shim that
      # gesture-handler 2.31.x imports — Metro `export:embed` fails to resolve
      # it on Android — and (b) trips reanimated 4.3.1's
      # `assert_minimal_react_native_version` in `pod install` on iOS. CI is
      # green (no native build) so it shipped straight to a failed store build
      # (#593 post-mortem). Now that the override exists, a re-proposed bump
      # instead dies at `pnpm install --frozen-lockfile` with
      # `ERR_PNPM_LOCKFILE_CONFIG_MISMATCH` (the override contradicts the
      # lockfile) — exactly why #623's expo-sdk group is red. The override and
      # this ignore must move together; both change only via a manual
      # `expo install --fix` SDK upgrade (see #465).
      - dependency-name: "react-native"
      # These native modules are version-locked by the Expo SDK
      # (bundledNativeModules.json) AND hard-pinned in the root package.json
      # `pnpm.overrides`. Dependabot can't edit overrides, so every bump it
      # raises (a) contradicts the override and dies at `pnpm install
      # --frozen-lockfile`, and (b) overshoots the current SDK's blessed
      # version — e.g. #475 offered gesture-handler 3.0.0 / reanimated 4.4.0 /
      # worklets 0.9.1 on an SDK-56 host (which bundles 2.31.1 / 4.3.1 /
      # 0.8.3), the partial-upgrade native-init crash class. They move only as
      # part of a manual `expo install --fix` SDK upgrade (see #465), so
      # Dependabot leaves them alone. Update this list if the override set in
      # the root package.json changes.
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-worklets"
      - dependency-name: "react-native-screens"
      - dependency-name: "react-native-gesture-handler"
      - dependency-name: "react-native-safe-area-context"
      # react / react-dom / react-test-renderer are version-locked by the
      # Expo SDK (bundledNativeModules.json pins them — SDK 56 wants exactly
      # 19.2.3) AND hard-pinned in the root package.json `pnpm.overrides`.
      # React asserts an EXACT version match between `react` and the renderer
      # baked into `react-native` ("Incompatible React versions" otherwise),
      # so they are not free to float independently of `react-native` /
      # `expo` — a standalone bump lands a react that mismatches the SDK's
      # bundled `react-native-renderer` and crashes EVERY launch in React's
      # startup version check (renderWithHooks), before any UI renders. This
      # is exactly what shipped on 2026-05-29: Dependabot's old `react` group
      # bumped react/react-dom to 19.2.6 while SDK 56 / RN 0.85.3 ship the
      # renderer at 19.2.3. They move only via a manual `expo install --fix`
      # SDK upgrade (see #465). Note these were ALSO formerly listed in a
      # `react` *group*; grouping kept react+react-dom aligned with each other
      # but NOT with the SDK, which is the gap that caused the crash. Update
      # this list (and the root `pnpm.overrides`) if the SDK's pinned react
      # version changes.
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-test-renderer"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # History is a steady stream of one-off action-bump PRs (#369-373,
    # #413, #128/#127/#126, #13/#12/#11/#10). They're low-risk and fully
    # CI-gated, so bundle them into one weekly PR to cut review noise.
    groups:
      github-actions:
        patterns:
          - "*"
