name: Prune GHCR

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  prune:
    name: Delete old container versions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune showbook-web
        uses: actions/delete-package-versions@v5
        with:
          package-name: showbook-web
          package-type: container
          min-versions-to-keep: 25
          delete-only-untagged-versions: false
          # No ignore-versions guard for :latest. `ignore-versions` matches
          # the regex against each version's *name*, which for a container
          # package is the sha256 digest — never the tag. So '^latest$' would
          # match nothing and protect nothing (an inert no-op). It isn't
          # needed anyway: every main build re-points :latest at that build's
          # freshly-pushed digest, so the digest :latest *currently* points at
          # is always the most-recently-created version — comfortably inside
          # the min-versions-to-keep=25 window. (A prune can still reap an
          # older digest that :latest used to point at, but that's a stale
          # :<sha>, not the live :latest.)
