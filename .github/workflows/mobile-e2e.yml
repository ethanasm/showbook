name: Mobile E2E (Maestro, Android)

# Mobile e2e ran on Maestro Cloud until 2026-05; that service is paid
# only (free trial only, no free tier), so the automated path is now
# Android-only on a self-hosted runner inside the prod WSL box. iOS
# coverage is manual via `pnpm mobile:e2e:ios` on the dev Mac — see
# docs/specs/mobile-testing-strategy.md § Wave F for the rationale.
#
# The e2e tier is a smoke layer above the unit / component / integration
# tiers; Android catches ~90% of regressions because the surface
# (auth gate, navigation, optimistic mutations) is platform-shared in RN.
on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-e2e.yml'
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  schedule:
    # 09:00 UTC = 04:00 ET — runs after the nightly cron jobs settle.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  # contents:write needed for the failure-publish step that pushes
  # maestro debug screenshots to the pr-screenshots orphan branch.
  contents: write
  pull-requests: write

concurrency:
  # Per-PR runs cancel on push to save runner time; non-PR triggers
  # (push/schedule/dispatch) keep the old non-cancelling behaviour.
  group: mobile-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android-e2e:
    name: Local Android build + Maestro on self-hosted emulator
    # PR runs require the `mobile-visual` label so opt-in stays
    # explicit; non-PR triggers (push/schedule/dispatch) always run.
    # The dual `vars.MOBILE_E2E_ENABLED` / `MOBILE_E2E_API_URL_CONFIGURED`
    # gates that used to live here silently swallowed every run
    # (including labeled-PR runs) when either repo variable wasn't
    # flipped to 'true' — the symptom was "added the label, workflow
    # shows up but completes in <1s as skipped, no logs to diagnose".
    # The secret-presence checks inside the Build step below already
    # fail loudly with a useful `::error::` message if MAESTRO_E2E_TOKEN
    # / MAESTRO_E2E_USER_JSON / EXPO_PUBLIC_API_URL aren't configured,
    # so the secret-gate work the vars were doing is duplicated and
    # silent. Trust the in-step checks instead.
    #
    # One-time setup the runner still needs (none of which the gate
    # could have detected anyway):
    #   1. Bring up the e2e backend stack on the prod box — the
    #      loopback-only showbook-e2e-web / showbook-e2e-db pair the
    #      emulator talks to. See docs/specs/operations.md § "Mobile
    #      e2e backend" for the runbook (.env.e2e, `pnpm e2e:up`,
    #      `pnpm e2e:db:migrate`). deploy.yml keeps the stack on prod's
    #      image after that. The session token + backend URL are NO
    #      longer repo secrets — the "Mint e2e session" step below reads
    #      the stack's own AUTH_SECRET and encodes the bearer in-container
    #      each run, and EXPO_PUBLIC_API_URL is hardcoded to the
    #      deterministic emulator→host alias http://10.0.2.2:3004 (the
    #      old secrets kept drifting to the prod URL / a stale secret and
    #      silently 401'd). The APK build allows cleartext for that
    #      http:// host only in e2e builds — see the IS_E2E_BUILD plugin
    #      in apps/mobile/app.config.ts. The MAESTRO_E2E_TOKEN /
    #      MAESTRO_E2E_USER_JSON / EXPO_PUBLIC_API_URL secrets are now
    #      unused and can be deleted.
    #   2. Optional: set repo variable `ANDROID_SDK_ROOT` to the install
    #      path on the runner; defaults to /opt/android-sdk.
    #   3. Run scripts/setup-runner.sh on the prod box (already done if
    #      the runner is up), then scripts/setup-runner-android.sh once
    #      to install Android SDK (incl. build-tools + NDK), create the
    #      e2e AVD, and install Maestro.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'mobile-visual')
    # Self-hosted runner registered by scripts/setup-runner.sh on the
    # prod WSL box (label `showbook-prod`). It needs Android SDK + AVD
    # installed via scripts/setup-runner-android.sh (one-time).
    runs-on: [self-hosted, showbook-prod]
    timeout-minutes: 60
    env:
      ANDROID_SDK_ROOT: ${{ vars.ANDROID_SDK_ROOT || '/opt/android-sdk' }}
      ANDROID_AVD_NAME: showbook_e2e
      # Persist the AVD home outside the workspace so it survives
      # actions/checkout's clean step and we don't have to re-upload
      # 3 GB of disk image to GitHub's cache backend on every run.
      # The self-hosted runner has a stable HOME between jobs, so
      # the AVD persists naturally on disk without actions/cache.
      ANDROID_AVD_HOME: ${{ vars.ANDROID_AVD_HOME || '/home/ethan/.android-avd' }}
      # Gradle in CI: no daemon (single-job runner), single worker
      # process, and a 2 GB heap cap. The previous 4 GB cap + parallel
      # emulator (2 GB AVD) + Metro overran the WSL runner's memory
      # budget and Gradle got OOM-killed ~16 min into the build.
      GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=1 -Dorg.gradle.parallel=false -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"'
    steps:
      - uses: actions/checkout@v7

      # Diagnose the runner up-front. The previous workflow used to hit
      # the 45-min timeout because nobody knew where the time was going
      # — disk, KVM availability, and SDK presence are the three usual
      # suspects, so we log them here before anything expensive runs.
      - name: Diagnose runner
        shell: bash
        run: |
          set -u
          echo "::group::Runner diagnostics"
          uname -a
          free -h || true
          df -h /
          df -h "$HOME" || true
          echo "JAVA: $(java -version 2>&1 | head -1)"
          echo "KVM:"
          if [ -e /dev/kvm ]; then
            ls -l /dev/kvm
            if [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
              echo "  KVM accessible"
            else
              echo "  KVM exists but not r/w by $USER — emulator falls back to software CPU emulation"
            fi
          else
            echo "  /dev/kvm missing — software CPU emulation (slow)"
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if [ -d "$ANDROID_SDK_ROOT" ]; then
            ls -la "$ANDROID_SDK_ROOT" 2>/dev/null || true
          else
            echo "  ANDROID_SDK_ROOT does not exist — run scripts/setup-runner-android.sh on the runner"
          fi
          echo "ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
          if [ -d "$ANDROID_AVD_HOME" ]; then
            ls -la "$ANDROID_AVD_HOME" 2>/dev/null || true
          fi
          echo "AVDs:"
          if [ -x "$ANDROID_SDK_ROOT/emulator/emulator" ]; then
            "$ANDROID_SDK_ROOT/emulator/emulator" -list-avds || true
          fi
          echo "Gradle cache dir:"
          du -sh "$HOME/.gradle/caches" 2>/dev/null || echo "  empty"
          echo "::endgroup::"

      # The runner is self-hosted and the box is shared (other repos'
      # runners, manual sessions), so a crashed or interrupted run can
      # leave behind (a) an emulator instance still registered with the
      # global adb server — a second device makes `adb wait-for-device`
      # die with "more than one device/emulator" under set -e (run
      # 28836200584), and (b) a populated /tmp/maestro-debug from a
      # PREVIOUS run — when this run's capture steps are skipped, the
      # failure-path publisher scoops those stale files and posts another
      # app's screenshots as if they were ours (same run). Reset both.
      # Process kills are scoped to OUR AVD name so a sibling project's
      # active emulator is never touched; if a foreign device is still
      # visible afterwards, log it loudly — the wait step will fail and
      # this group is the diagnosis.
      - name: Reset stale runner state
        shell: bash
        run: |
          set -uo pipefail
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "::group::Stale-state reset"
          pkill -f "emulator -avd ${ANDROID_AVD_NAME}" 2>/dev/null && echo "killed stale ${ANDROID_AVD_NAME} emulator" || true
          pkill -f "qemu.*${ANDROID_AVD_NAME}" 2>/dev/null && echo "killed stale ${ANDROID_AVD_NAME} qemu" || true
          sleep 2
          rm -f "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd"/*.lock 2>/dev/null || true
          rm -rf /tmp/maestro-debug /tmp/maestro-debug-flat
          adb kill-server 2>/dev/null || true
          adb start-server 2>/dev/null || true
          DEVICES=$(adb devices | tail -n +2 | awk 'NF' || true)
          if [ -n "$DEVICES" ]; then
            echo "::warning::devices still registered with adb before emulator start (a foreign emulator will break 'Wait for emulator'):"
            echo "$DEVICES"
          else
            echo "adb device list clean"
          fi
          echo "::endgroup::"

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── No actions/cache for Gradle / AVD on self-hosted runner ────
      #
      # actions/cache@v4 was tarballing the 3 GB workspace AVD (incl.
      # userdata.img + boot snapshot) and uploading to GitHub's cache
      # backend on every run, then downloading and extracting it back
      # on the next run. The first half of run 25980860191 spent ~15
      # min on that upload, dominating the wall-clock budget.
      #
      # This runner is self-hosted with a persistent disk — `~/.gradle/`,
      # `~/.android/avd/`, and the pnpm store all survive between jobs
      # already. The previous "restore from GHA cache → unpack to
      # workspace → re-pack and upload at job end" dance was solving
      # the GitHub-hosted ephemeral-runner problem we don't have. The
      # AVD now lives at $ANDROID_AVD_HOME (default
      # /home/ethan/.android-avd) and persists across runs as plain
      # disk state.
      #
      # If the AVD doesn't exist yet (fresh runner), the
      # "Materialize AVD" step below still bootstraps it inline.
      - name: Materialize AVD on disk
        shell: bash
        env:
          ANDROID_AVD_SYSTEM_IMAGE: ${{ vars.ANDROID_AVD_SYSTEM_IMAGE || 'system-images;android-34;google_apis;x86_64' }}
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_AVD_HOME"
          if [ -d "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd" ]; then
            echo "AVD already present at $ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd"
          else
            # First-run bootstrap. After this, the AVD lives on disk
            # and subsequent runs hit the "already present" branch.
            CANDIDATES=(
              "$HOME/.android/avd"
              "${ANDROID_USER_HOME:-}/avd"
              "/opt/android-sdk/.android/avd"
            )
            FOUND=""
            for dir in "${CANDIDATES[@]}"; do
              [ -z "$dir" ] && continue
              if [ -d "$dir/${ANDROID_AVD_NAME}.avd" ]; then
                FOUND="$dir"
                break
              fi
            done

            if [ -n "$FOUND" ]; then
              echo "Seeding $ANDROID_AVD_HOME AVD from $FOUND (one-time)"
              cp -a "$FOUND/${ANDROID_AVD_NAME}.ini"  "$ANDROID_AVD_HOME/" 2>/dev/null || true
              cp -a "$FOUND/${ANDROID_AVD_NAME}.avd"  "$ANDROID_AVD_HOME/"
              if [ -f "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.ini" ]; then
                sed -i "s#path=.*#path=$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd#" \
                  "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.ini"
              fi
            else
              echo "AVD '${ANDROID_AVD_NAME}' not found anywhere — creating inline"
              SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
              AVDMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager"
              if [ ! -x "$SDKMANAGER" ] || [ ! -x "$AVDMANAGER" ]; then
                echo "::error::cmdline-tools missing — run scripts/setup-runner-android.sh on the runner so sdkmanager + avdmanager are installed"
                exit 1
              fi
              yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
              "$SDKMANAGER" --install "$ANDROID_AVD_SYSTEM_IMAGE" >/dev/null
              ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
                echo "no" | "$AVDMANAGER" create avd \
                  --name "$ANDROID_AVD_NAME" \
                  --package "$ANDROID_AVD_SYSTEM_IMAGE" \
                  --device "pixel_6" \
                  --path "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd" \
                  --force
              CFG="$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd/config.ini"
              if [ -f "$CFG" ]; then
                {
                  echo "hw.ramSize=2048"
                  echo "vm.heapSize=512"
                  echo "disk.dataPartition.size=4096M"
                  echo "hw.gpu.enabled=yes"
                  echo "hw.gpu.mode=swiftshader_indirect"
                } >> "$CFG"
              fi
            fi
          fi
          ls -la "$ANDROID_AVD_HOME"

      - name: Install Maestro CLI
        shell: bash
        run: |
          if ! command -v maestro >/dev/null 2>&1; then
            curl -fsSL "https://get.maestro.mobile.dev" | bash
          fi
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Validate Maestro flow YAML
        run: pnpm --filter mobile e2e:dry

      # Mint the e2e bearer session from the running backend, rather than
      # from hand-maintained repo secrets. This runner is the same box the
      # showbook-e2e stack runs on, so we can read the stack's own
      # AUTH_SECRET and encode the token with the *exact* next-auth the
      # decoder uses — eliminating the entire class of "token signed with
      # the wrong/stale secret → UNAUTHORIZED" failures that plague
      # out-of-band minting (the secret churns whenever .env.e2e is
      # regenerated). The token is short-lived (7 days) and masked.
      #
      # Requires the showbook-e2e stack to be up (deploy.yml keeps it
      # running; first-time setup is `pnpm e2e:up` — see
      # docs/specs/operations.md § "Mobile e2e backend"). The
      # MAESTRO_E2E_TOKEN / MAESTRO_E2E_USER_JSON / EXPO_PUBLIC_API_URL
      # repo secrets are no longer consulted.
      - name: Mint e2e session from the running backend
        shell: bash
        run: |
          set -euo pipefail
          if ! docker ps --format '{{.Names}}' | grep -qx 'showbook-e2e-web'; then
            echo "::error::showbook-e2e-web container is not running — bring the stack up with 'pnpm e2e:up' on the box (docs/specs/operations.md § Mobile e2e backend)"
            exit 1
          fi
          EMAIL="maestro-e2e@showbook.test"
          # Ensure the synthetic test user row exists; capture its id so the
          # token's `id` claim points at a real users row (shows.create FKs
          # against it).
          USERID=$(docker exec showbook-e2e-db psql -U showbook_e2e -d showbook_e2e -tAc \
            "SELECT id FROM users WHERE email='${EMAIL}' LIMIT 1;" | tr -d '[:space:]')
          if [ -z "$USERID" ]; then
            USERID=$(cat /proc/sys/kernel/random/uuid)
            docker exec showbook-e2e-db psql -U showbook_e2e -d showbook_e2e -tAc \
              "INSERT INTO users (id,email,name) VALUES ('${USERID}','${EMAIL}','Maestro E2E');" >/dev/null
          fi
          # Encode the bearer INSIDE the web container: its next-auth +
          # AUTH_SECRET + salt are exactly what the tRPC bearer path decodes
          # with, so the round-trip can't drift.
          TOKEN=$(docker exec -e USERID="$USERID" -e EMAIL="$EMAIL" showbook-e2e-web node -e '
            import("next-auth/jwt").then(async ({ encode }) => {
              const t = await encode({
                token: { sub: process.env.USERID, id: process.env.USERID, email: process.env.EMAIL, name: "Maestro E2E", picture: null },
                secret: process.env.AUTH_SECRET,
                salt: "authjs.session-token",
                maxAge: 7 * 24 * 60 * 60,
              });
              process.stdout.write(t);
            }).catch((e) => { console.error(e.message); process.exit(1); });
          ')
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::failed to mint e2e token from showbook-e2e-web"
            exit 1
          fi
          USERJSON=$(printf '{"id":"%s","email":"%s","name":"Maestro E2E","image":null}' "$USERID" "$EMAIL")
          # Mask the token so it never appears in build logs, then hand both
          # values to later steps via the job environment.
          echo "::add-mask::$TOKEN"
          {
            echo "E2E_TEST_TOKEN<<__E2E_EOF__"
            echo "$TOKEN"
            echo "__E2E_EOF__"
            echo "E2E_TEST_USER_JSON=$USERJSON"
          } >> "$GITHUB_ENV"
          echo "Minted e2e session for ${EMAIL} (user ${USERID})"

      # Build the APK locally on the runner instead of going through EAS
      # Build. The runner has Android SDK + build-tools + NDK from
      # scripts/setup-runner-android.sh, and EAS Build's free tier is
      # too tight to cover per-PR runs.
      #
      # We build the **release** variant, not debug. With `expo-dev-client`
      # in dependencies, `assembleDebug` produces a dev-client APK that
      # shows the "Development Build / Start a local development server"
      # launcher and waits for Metro — there's no Metro in CI, so the
      # Showbook UI never renders and Maestro times out asserting on
      # signin text that doesn't exist on screen. `assembleRelease`
      # bundles the JS into the APK (via Hermes/Metro at build time) and
      # is signed with the debug keystore by Expo's prebuild template,
      # so the APK is self-contained and installable.
      #
      # The bundled-env auth bypass (lib/auth-helpers.ts) reads
      # EXPO_PUBLIC_E2E_TEST_TOKEN / EXPO_PUBLIC_E2E_TEST_USER_JSON
      # inlined at build time, so the Maestro flow YAML doesn't need
      # a deeplink seeding step.
      - name: Build Android APK locally
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_E2E_MODE: '1'
          # Session minted from the running backend in the previous step.
          EXPO_PUBLIC_E2E_TEST_TOKEN: ${{ env.E2E_TEST_TOKEN }}
          EXPO_PUBLIC_E2E_TEST_USER_JSON: ${{ env.E2E_TEST_USER_JSON }}
          # The Android emulator on this self-hosted runner reaches the
          # loopback-only showbook-e2e-web (127.0.0.1:3004) via the AVD's
          # host alias 10.0.2.2. This is deterministic for the self-hosted
          # setup, so it's hardcoded rather than a secret — the old
          # EXPO_PUBLIC_API_URL secret kept drifting to the prod URL and
          # silently sent the e2e token to prod (→ UNAUTHORIZED → empty
          # Shows list). Cleartext for this http:// host is allowed only
          # in e2e builds via the IS_E2E_BUILD plugin in app.config.ts.
          EXPO_PUBLIC_API_URL: http://10.0.2.2:3004
          # Spotify App Remote SDK client id — consumed at prebuild
          # time by `apps/mobile/modules/showbook-spotify-sdk/plugin/
          # index.js` which writes it into Info.plist (iOS) and
          # strings.xml (Android). Unset is non-fatal: the native side
          # rejects `connect()` with ERR_NO_CLIENT_ID and the
          # `SpotifySdkMount` short-circuit leaves the rest of the app
          # working. The CI runner still needs `com.spotify.music`
          # installed on the AVD for `play()` to do anything; one-time
          # setup tracked in `scripts/setup-runner-android.sh`.
          EXPO_PUBLIC_SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${EXPO_PUBLIC_E2E_TEST_TOKEN:-}" ] || [ -z "${EXPO_PUBLIC_E2E_TEST_USER_JSON:-}" ]; then
            echo "::error::e2e session env is empty — the 'Mint e2e session' step did not run or failed"
            exit 1
          fi
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          pnpm exec expo prebuild --platform android --non-interactive --no-install
          # EXPO_PUBLIC_* values are inlined by Metro at bundle time, but a
          # changed env var does NOT invalidate Gradle's up-to-date check or
          # Metro's transform cache (env isn't a tracked input). On this
          # persistent self-hosted workspace that means the JS bundle is
          # reused across runs and a changed EXPO_PUBLIC_API_URL never gets
          # re-inlined — the exact bug the post-build URL assertion caught
          # (stale prod URL baked in). Clear Metro's caches and force the
          # bundle task to re-run so the current env is inlined.
          rm -rf "${TMPDIR:-/tmp}"/metro-* "${TMPDIR:-/tmp}"/haste-map-* node_modules/.cache 2>/dev/null || true
          cd android
          # --build-cache uses the restored gradle caches; --no-daemon
          # keeps the runner clean between invocations.
          # Skip the lintVital* tasks: they're Play-Store-distribution
          # gates that don't affect the APK Maestro installs, and the
          # lint phase is metaspace-hungry enough to push the WSL
          # runner past the 2 GiB Gradle heap / 512 MiB metaspace
          # budget — when it OOMs mid-task the runner reports it as
          # "The operation was canceled" rather than a Gradle failure.
          #
          # Force a fresh JS bundle first (--rerun-tasks, scoped to the
          # bundle task so native compile stays cached/incremental), THEN
          # assemble. assembleRelease re-packages because the bundle output
          # changed, while the heavy native tasks reuse the workspace's
          # incremental state.
          ./gradlew :app:createBundleReleaseJsAndAssets \
            --rerun-tasks --no-daemon --console=plain
          ./gradlew :app:assembleRelease \
            -x lintVitalAnalyzeRelease -x lintVitalRelease \
            --no-daemon --console=plain \
            --build-cache
          APK="app/build/outputs/apk/release/app-release.apk"
          ls -lh "$APK"
          cp "$APK" /tmp/showbook-e2e.apk
          # Fail fast (here, not 20 min later in Maestro) if the backend URL
          # didn't get inlined into the JS bundle. EXPO_PUBLIC_* values are
          # baked at bundle time; this assertion is the guard that would have
          # caught the prod-URL-in-the-APK regression immediately.
          if ! unzip -p /tmp/showbook-e2e.apk assets/index.android.bundle 2>/dev/null \
               | strings | grep -aq 'http://10.0.2.2:3004'; then
            echo "::error::APK bundle is missing http://10.0.2.2:3004 — EXPO_PUBLIC_API_URL was not inlined into the build"
            exit 1
          fi
          echo "APK backend URL verified: http://10.0.2.2:3004"
          echo "::group::Memory after build"
          free -h || true
          df -h "$HOME" || true
          echo "::endgroup::"

      # ── Boot the emulator now that Gradle is done ──────────────────
      #
      # An earlier revision booted in parallel with the Gradle build to
      # save 5–10 min on cold cache runs, but on the WSL self-hosted
      # runner the 2 GB AVD + 4 GB Gradle heap + Metro overran memory
      # and Gradle was OOM-killed mid-build. Sequencing the two phases
      # keeps the peak footprint within budget; the warm-cache Gradle
      # build is short enough that the lost parallelism doesn't matter.
      - name: Start Android emulator (background)
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$PATH"
          adb kill-server || true
          adb start-server
          # -no-snapshot-save: don't write back into the cached AVD
          # -accel auto: use KVM when available, fall through to TCG
          # -gpu swiftshader_indirect: software GL, only sane option headless
          nohup env ANDROID_AVD_HOME="$ANDROID_AVD_HOME" \
            emulator -avd "$ANDROID_AVD_NAME" \
              -no-window -no-audio -no-boot-anim -no-snapshot-save \
              -accel auto \
              -gpu swiftshader_indirect \
            > /tmp/emulator.log 2>&1 &
          echo "emulator pid: $!"

      - name: Wait for emulator
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          adb wait-for-device
          # Poll boot completion for up to 10 min, logging progress
          # every 30 s so a hang is diagnosable from the run UI rather
          # than appearing as silence followed by a timeout kill.
          for i in $(seq 1 60); do
            BOOTED=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            ANIM_DONE=$(adb shell getprop init.svc.bootanim 2>/dev/null | tr -d '\r' || true)
            if [ "$BOOTED" = "1" ] && [ "$ANIM_DONE" != "running" ]; then
              echo "emulator booted after $((i * 10))s"
              # Unlock screen + disable animations so Maestro doesn't
              # have to wait for transitions or swipe past a lockscreen.
              adb shell input keyevent 82 || true
              adb shell settings put global window_animation_scale 0 || true
              adb shell settings put global transition_animation_scale 0 || true
              adb shell settings put global animator_duration_scale 0 || true
              exit 0
            fi
            if [ $((i % 3)) -eq 0 ]; then
              echo "  $((i * 10))s — boot_completed=${BOOTED:-?} bootanim=${ANIM_DONE:-?}"
            fi
            sleep 10
          done
          echo "::error::emulator failed to boot in 10 minutes"
          tail -100 /tmp/emulator.log || true
          exit 1

      - name: Install APK
        shell: bash
        run: |
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          adb install -r /tmp/showbook-e2e.apk

      # Launch the app + capture a screenshot + UI hierarchy dump
      # before Maestro runs. The hierarchy XML names every visible
      # text element, so "is the Sign in with Google button actually
      # on screen?" stops being a guess. Both artefacts also help
      # diagnose post-Maestro state (the dump is taken before flows
      # so `clearState: true` in the flow wipes it after this, but
      # the screenshot captures the cold-launch landing screen).
      - name: Capture cold-launch state
        shell: bash
        run: |
          set -uo pipefail
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          mkdir -p /tmp/maestro-debug
          # Cold-launch the app the same way Maestro will (clear data
          # + start MainActivity). `pm clear` is a no-op if the package
          # wasn't installed; the install step above guarantees it is.
          adb shell pm clear me.ethanasm.showbook || true
          adb shell am start -W -n me.ethanasm.showbook/.MainActivity || true
          sleep 8
          adb exec-out screencap -p > /tmp/maestro-debug/cold-launch.png || true
          adb shell uiautomator dump /sdcard/cold-launch.xml >/dev/null 2>&1 || true
          adb pull /sdcard/cold-launch.xml /tmp/maestro-debug/cold-launch.xml || true
          echo "::group::Cold-launch UI hierarchy (text nodes only)"
          if [ -f /tmp/maestro-debug/cold-launch.xml ]; then
            # Print every node with non-empty text= attr. Tells us
            # whether 'Sign in with Google' is actually rendered.
            grep -oE 'text="[^"]*"' /tmp/maestro-debug/cold-launch.xml \
              | grep -v 'text=""' | sort -u | head -50 || true
          else
            echo "no UI dump captured"
          fi
          echo "::endgroup::"
          echo "::group::Cold-launch screenshot size"
          ls -lh /tmp/maestro-debug/cold-launch.png 2>/dev/null || echo "no screenshot"
          echo "::endgroup::"
          # Kill the app again so Maestro's first launchApp starts cleanly.
          adb shell am force-stop me.ethanasm.showbook || true

      - name: Run Maestro flows
        shell: bash
        run: |
          set -uo pipefail
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$HOME/.maestro/bin:$PATH"
          # `--debug-output` is a flag on the `test` subcommand, not a
          # global flag — it writes detailed step traces + screenshots
          # to the named dir. Uploaded as an artifact below regardless
          # of outcome so reviewers see exactly what Maestro saw.
          # Wipe only Maestro's own subdirectory so /tmp doesn't
          # accumulate screenshots across runs, but preserve the
          # cold-launch.png + cold-launch.xml that the previous step
          # wrote into /tmp/maestro-debug/.
          rm -rf /tmp/maestro-debug/.maestro
          mkdir -p /tmp/maestro-debug
          # Maestro's `launchApp: clearState: true` in flow YAML
          # translates to `pm clear`, but on this AOSP system-image
          # SecureStore values appear to survive that across flows in
          # the same `maestro test <dir>` invocation — run
          # 25977641842's three flows all landed on the same signed-in
          # Welcome screen even though each flow declares clearState.
          # Work around it by invoking maestro once per flow file with
          # an explicit pm clear in between.
          RC=0
          for flow in apps/mobile/e2e/flows/*.yaml; do
            echo "::group::pm clear before $(basename "$flow")"
            adb shell pm clear me.ethanasm.showbook || true
            sleep 2
            echo "::endgroup::"
            maestro test --debug-output /tmp/maestro-debug "$flow" || {
              status=$?
              echo "::warning::$(basename "$flow") failed with status $status"
              RC=$status
            }
          done
          exit $RC

      # Summarise the debug dir into the run log so a failed Maestro
      # step is diagnosable from the GitHub Actions UI even when the
      # artifact viewer fails to render the .png screenshots. The
      # commands.json + Maestro stdout in the debug dir name the
      # exact flow + step that failed.
      - name: Summarise Maestro debug output
        if: failure()
        shell: bash
        run: |
          set -u
          echo "::group::Maestro debug dir contents"
          ls -la /tmp/maestro-debug/ 2>/dev/null || echo "no debug dir"
          echo "::endgroup::"
          # Look for any plain-text log or json summary Maestro left
          # behind and dump the last 200 lines into the run log.
          shopt -s nullglob
          for f in /tmp/maestro-debug/**/*.txt /tmp/maestro-debug/**/*.json /tmp/maestro-debug/**/*.log /tmp/maestro-debug/*.txt /tmp/maestro-debug/*.json /tmp/maestro-debug/*.log; do
            echo "::group::$f"
            tail -200 "$f" 2>/dev/null || true
            echo "::endgroup::"
          done
          # List screenshots so we know which steps ran before the failure.
          echo "::group::Screenshots captured"
          find /tmp/maestro-debug -name '*.png' -printf '%p\n' 2>/dev/null | sort || true
          echo "::endgroup::"

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-debug-${{ github.run_id }}
          path: |
            /tmp/maestro-debug/**
            /tmp/emulator.log
          if-no-files-found: ignore
          retention-days: 7

      # Catch-all failure comment. The Publish step below only fires
      # when Maestro produced screenshots; failures earlier in the job
      # (Build, emulator boot, install, Maestro CLI install) would
      # otherwise leave the PR with no signal beyond a red check.
      # Post a short comment with the run URL on every failure so
      # reviewers see the breakage in the PR thread.
      - name: Post failure comment on PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_STEP: ${{ steps.maestro.outcome }}
        shell: bash
        run: |
          set -uo pipefail
          BODY_FILE=$(mktemp)
          {
            printf '## Mobile e2e (Android) — failed\n\n'
            printf '[Workflow run](%s) — see the run log for the failing step.\n\n' "$RUN_URL"
            printf 'Maestro debug screenshots (if any were captured) are uploaded as the `maestro-debug-%s` artifact.\n' "${{ github.run_id }}"
          } > "$BODY_FILE"
          set +e
          GH_OUTPUT=$(gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" 2>&1)
          GH_RC=$?
          set -uo pipefail
          echo "::group::gh pr comment result"
          echo "$GH_OUTPUT"
          echo "exit code: $GH_RC"
          echo "::endgroup::"
          if [ "$GH_RC" -ne 0 ]; then
            echo "::warning::gh pr comment failed (rc=$GH_RC)"
          fi

      # Push the Maestro debug PNGs to the existing `pr-screenshots`
      # orphan branch under `mobile-e2e/run-<id>/` and post the raw
      # URLs as a PR comment. Repo is public so
      # raw.githubusercontent.com URLs are fetchable without auth —
      # that lets Claude pull the cold-launch screenshot directly via
      # WebFetch instead of asking the operator to download the
      # artefact ZIP. Mirrors the existing upload-pr-screenshots
      # pattern used by the web PR-screenshots flow.
      #
      # We deliberately reuse `pr-screenshots` rather than creating a
      # separate `mobile-e2e-debug` orphan branch because the
      # `git worktree add --orphan` syntax used to create a new orphan
      # branch requires Git ≥ 2.42, which the WSL Ubuntu 22.04 runner
      # doesn't have. The existing branch's worktree path works on any
      # Git version.
      - name: Publish maestro debug to pr-screenshots branch
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -uo pipefail
          if [ ! -d /tmp/maestro-debug ]; then
            echo "no /tmp/maestro-debug — nothing to publish"
            exit 0
          fi

          # Flatten Maestro's nested per-run dirs into one flat dir
          # with sanitised filenames. Each per-flow screenshot is named
          # `screenshot-<emoji>-<ts>-(flow).png`; collapse to
          # `maestro-<flow>-<n>.png` so the orphan-branch URL stays
          # clean.
          FLAT=/tmp/maestro-debug-flat
          rm -rf "$FLAT"
          mkdir -p "$FLAT"
          [ -f /tmp/maestro-debug/cold-launch.png ] && cp /tmp/maestro-debug/cold-launch.png "$FLAT/cold-launch.png"
          n=1
          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            flow="$(echo "$base" | sed -E 's/.*\(([^)]+)\)\.png$/\1/' | tr -c '[:alnum:]-' '-')"
            [ -z "$flow" ] && flow="unknown"
            cp "$f" "$FLAT/maestro-${flow}-${n}.png"
            n=$((n + 1))
          done < <(find /tmp/maestro-debug -name '*.png' -path '*tests*' -print0)

          echo "::group::Files staged for upload"
          ls -la "$FLAT"
          echo "::endgroup::"

          # The upload script's `git commit` requires an author identity.
          # actions/checkout doesn't set one by default on self-hosted
          # runners, so configure the GitHub Actions bot identity here.
          # Scoped to --global because the script operates inside a
          # temporary worktree, not the original checkout.
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Reuse the existing orphan-branch uploader, targeting the
          # already-existing `pr-screenshots` branch. The `--branch`
          # value becomes the subdirectory inside that branch — using a
          # slash-prefixed value puts our files under
          # `mobile-e2e/run-<id>/`, alongside the web PR screenshots
          # already there.
          RUN_DIR="mobile-e2e/run-${{ github.run_id }}"
          # Don't swallow errors — if upload fails, we want the run to
          # show it. The diagnostic step above + the artefact upload
          # above are still preserved as fallbacks.
          OUTPUT=$(node scripts/upload-pr-screenshots.mjs \
            --branch "$RUN_DIR" \
            --pr "$PR_NUMBER" \
            --dir "$FLAT" \
            --target-branch pr-screenshots 2>&1)
          UPLOAD_RC=$?
          echo "::group::upload-pr-screenshots output"
          echo "$OUTPUT"
          echo "exit code: $UPLOAD_RC"
          echo "::endgroup::"
          if [ "$UPLOAD_RC" -ne 0 ]; then
            echo "::error::upload-pr-screenshots failed — see group above"
            exit 0   # don't fail the job over the debug-publish step itself
          fi

          # Extract the JSON array (the script prints log lines before it) and
          # render it as markdown image links. Use node, not jq: the
          # self-hosted runner has node (the whole build depends on it) but no
          # jq binary, and the missing jq was silently killing this step with
          # exit 127 so the debug comment never posted.
          IMAGES_MD=$(printf '%s' "$OUTPUT" | node -e '
            const text = require("fs").readFileSync(0, "utf8");
            const lines = text.split("\n");
            const start = lines.findIndex((l) => l.trim() === "[");
            const end = lines.findIndex((l) => l.trim() === "]");
            if (start === -1 || end === -1 || end < start) process.exit(0);
            const arr = JSON.parse(lines.slice(start, end + 1).join("\n"));
            console.log(arr.map((x) => "![" + x.name + "](" + x.url + ")").join("\n"));
          ')

          # Inline the text= nodes from the cold-launch UI dump
          # directly in the PR comment — small enough to fit, readable
          # without opening an external file. Capped at 100 entries to
          # stay under the 64 KB comment limit.
          UI_TEXT=""
          if [ -f /tmp/maestro-debug/cold-launch.xml ]; then
            UI_TEXT=$(grep -oE 'text="[^"]*"' /tmp/maestro-debug/cold-launch.xml \
              | grep -v 'text=""' | sort -u | head -100 || true)
          fi

          BODY_FILE=$(mktemp)
          {
            printf '## Mobile e2e debug — `%s`\n\n' "$RUN_DIR"
            printf '[Workflow run](%s) failed. Cold-launch screenshot first, then Maestro per-flow screenshots.\n\n' "$RUN_URL"
            printf '%s\n\n' "$IMAGES_MD"
            if [ -n "$UI_TEXT" ]; then
              printf '<details><summary>Cold-launch UI hierarchy (text nodes)</summary>\n\n'
              printf '```\n%s\n```\n\n' "$UI_TEXT"
              printf '</details>\n'
            fi
            printf '\n_Hosted on the `pr-screenshots` branch alongside the maestro-debug-%s artifact._\n' "${{ github.run_id }}"
          } > "$BODY_FILE"

          echo "::group::PR comment body preview"
          cat "$BODY_FILE"
          echo "::endgroup::"
          # The previous failed runs uploaded screenshots to the orphan
          # branch but never produced a comment — `gh pr comment` was
          # exiting non-zero silently. Capture the exit code + output
          # so a future regression is visible in the log instead of
          # only by the absence of a comment.
          set +e
          GH_OUTPUT=$(gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" 2>&1)
          GH_RC=$?
          set -uo pipefail
          echo "::group::gh pr comment result"
          echo "$GH_OUTPUT"
          echo "exit code: $GH_RC"
          echo "::endgroup::"
          if [ "$GH_RC" -ne 0 ]; then
            echo "::warning::gh pr comment failed (rc=$GH_RC); upload to orphan branch still succeeded"
          fi

      # Only on PR runs: append/replace a `## Mobile screenshots` section
      # in the PR body, bracketed by sentinel comments so re-runs replace
      # cleanly. Runs on success and failure so reviewers see the
      # workflow run + debug artifact link even when a flow fails.
      - name: Update PR body with workflow run link
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          CURRENT=$(gh pr view "$PR_NUMBER" --json body --jq .body)
          STRIPPED=$(printf '%s' "$CURRENT" | awk '
            /<!-- mobile-screenshots:start -->/ { skip=1; next }
            /<!-- mobile-screenshots:end -->/   { skip=0; next }
            !skip { print }
          ')
          NEW_SECTION=$(cat <<EOF
          <!-- mobile-screenshots:start -->
          ## Mobile e2e (Android)

          Workflow run: $RUN_URL
          (Maestro screenshots + emulator log are uploaded as the
          \`maestro-debug-${{ github.run_id }}\` artifact on every run.)
          <!-- mobile-screenshots:end -->
          EOF
          )
          NEW_BODY="${STRIPPED%$'\n'}"$'\n\n'"$NEW_SECTION"
          gh pr edit "$PR_NUMBER" --body "$NEW_BODY"

      - name: Shut down emulator
        if: always()
        shell: bash
        run: |
          export PATH="$ANDROID_SDK_ROOT/platform-tools:$PATH"
          adb emu kill || true
          adb kill-server || true
          # Wait for the emulator process to actually release its lock
          # files. `adb emu kill` sends SIGTERM and returns immediately,
          # but the qemu/emulator process keeps running for another
          # second or two while it cleans up *.lock files in the AVD
          # dir. Without this wait the leftover locks accumulate on
          # disk and the next run starts with a stale state.
          for i in $(seq 1 30); do
            pgrep -f "emulator -avd ${ANDROID_AVD_NAME}" >/dev/null || break
            sleep 1
          done
          # Belt-and-suspenders: nuke any stragglers if the emulator
          # didn't release them itself.
          rm -f "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd"/*.lock 2>/dev/null || true
          rm -f "$ANDROID_AVD_HOME/${ANDROID_AVD_NAME}.avd"/*.lock.lock 2>/dev/null || true
