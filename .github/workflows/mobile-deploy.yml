name: Mobile Deploy (preview)

# Continuous mobile deployment, with an approval gate on store releases.
#
# Every CI-green push to `main` runs the `plan` job, which decides
# between the two delivery paths:
#
#  - **OTA path (ungated, continuous):** JS-only changes run
#    `eas update --branch preview`, which pushes a fresh JS bundle to
#    the preview channel. Installed preview builds pick it up on next
#    cold start. This stays fully automatic — OTA is how bugfixes reach
#    devices in minutes, so it must never wait on a human.
#
#  - **Release path (gated):** changes that need a new native binary
#    (added Expo plugin, new native dep, new permission string —
#    detected against the parent commit) route to the `release` job,
#    which targets the `mobile-release` GitHub **environment**. When
#    that environment has a required reviewer configured, the job
#    PAUSES at the gate — GitHub sends a "review pending deployments"
#    notification (web, email, and the GitHub mobile app) and nothing
#    bumps, builds, or submits until someone clicks Approve. Reject (or
#    let the 30-day approval window lapse) and the run dies without
#    side effects: no version bump, no mobile-v* tag, no EAS build, no
#    store upload. The changes simply ride the next approved release —
#    the version scan is range-based (everything since the last
#    mobile-v* tag), so nothing is ever lost by skipping a release.
#    The workflow_dispatch build mode goes through the same gate
#    (you can approve your own dispatch unless the environment enables
#    "prevent self-review").
#
#    ONE-TIME SETUP (the gate is FAIL-OPEN until you do this): GitHub
#    auto-creates the `mobile-release` environment with no protection
#    rules on first run, which means releases ship immediately —
#    identical to the old ungated behavior. To arm the gate:
#    Settings → Environments → mobile-release → check
#    "Required reviewers" → add yourself → Save protection rules.
#    See docs/specs/mobile-deployment.md → "Release approval gate".
#
# **Versioning is automated on the release path** (decision D25 in
# docs/specs/decisions.md). After approval, before `eas build` runs,
# the workflow bumps `version` in apps/mobile/app.config.ts, commits it
# back to main with [skip ci], and tags the commit `mobile-vX.Y.Z`.
# Minor vs patch is decided by scanning the squash-merge subjects on
# main since the last `mobile-v*` tag for conventional-commit prefixes:
# any `feat:` (or a breaking-change `!` marker) → minor, otherwise
# patch. (Pre-1.0, breaking also maps to minor — the 1.0.0 jump is
# manual, see D25.) The OTA path NEVER bumps: `runtimeVersion:
# { policy: 'appVersion' }` means a bump without a binary would target
# a runtime no installed build has, so nobody would receive the update.
# A manual bump in the triggering merge (the version line changed in
# the diff) is respected — the workflow ships it as-is instead of
# double-bumping. The workflow_dispatch `bump` input can override the
# scan (patch / minor / none). The bump-back push has to get past
# main's required-PR rule, and the built-in github-actions app can NOT
# be put on a ruleset bypass list — so the push authenticates as a
# deploy key (RELEASE_DEPLOY_KEY secret + "Deploy keys" checked in the
# ruleset's bypass list; recommended) or as a bypass-listed actor's
# fine-grained PAT (RELEASE_PUSH_TOKEN secret) — see the Versioning
# section of docs/specs/mobile-deployment.md. Neither path can loop
# this deploy: deploy-key/PAT pushes do trigger workflows, but
# [skip ci] in the bump commit message suppresses CI, and this deploy
# only runs off CI completion / manual dispatch.
#
# Because the bump happens AFTER approval, a rejected release leaves
# the repo untouched — the gate sits in front of every side effect.
#
# **Approved builds auto-submit to the preview store track on BOTH
# platforms** (via `eas submit`): Android to the Play Console internal
# testing track using the service account JSON in the
# `PLAY_SERVICE_ACCOUNT_JSON` secret, iOS to TestFlight internal
# testing using the App Store Connect API key in the `ASC_API_KEY_*`
# secrets. Testers pick up the new build through the Play Store /
# TestFlight once the store finishes processing the upload — no
# sideload, no Advanced Protection friction, no manual IPA handling.
#
# **Concurrency** is per-job, not per-workflow, on purpose: a release
# waiting at the approval gate must never block OTA deploys from later
# merges, so the `ota` and `release` jobs hold separate groups. Within
# the release group, a run still waiting for approval when a newer
# native merge lands may be superseded (GitHub keeps the newest pending
# run in a group) — that's the right outcome, because the newest run's
# range scan covers every commit the stale one would have shipped.
#
# Runs on a GitHub-hosted runner — EAS Build/Submit/Update all
# execute in Expo's cloud, so there's nothing to host locally. The
# prod box is not involved.
#
# Required secrets (Settings → Secrets → Actions):
#  - EXPO_TOKEN — `eas-cli token:create` or expo.dev → Account
#    Settings → Access Tokens. Drives `eas update` + `eas build`.
#  - PLAY_SERVICE_ACCOUNT_JSON — full JSON contents of the Google
#    service-account key with Play Console "Manage testing track
#    releases" permission on the Showbook app. Without it the
#    Android submit step fails fast (intentionally — better than
#    silently shipping nothing).
#  - ASC_API_KEY_P8 — full contents of the App Store Connect API
#    private key (.p8) generated under App Store Connect → Users and
#    Access → Integrations → App Store Connect API (role: App
#    Manager or Developer is enough for TestFlight uploads).
#  - ASC_API_KEY_ID — the key ID of that .p8 (shown next to the key).
#  - ASC_API_KEY_ISSUER_ID — the issuer ID shown at the top of the
#    same Integrations page.
#  - ASC_APP_ID — the numeric Apple ID of the Showbook app record
#    (App Store Connect → App Information → Apple ID). Required
#    because non-interactive `eas submit` can't prompt for the app.
#    Like the Play secret, a missing ASC_* secret fails the iOS
#    submit step fast.
#
# Optional secrets (enable the failure-notification email — without
# them a failed deploy just relies on GitHub's stock "run failed"
# email, which has no logs). Copy the same values you already set in
# .env.prod for the daily digest:
#  - RESEND_API_KEY — Resend API key (the app already uses Resend).
#  - EMAIL_FROM — verified Resend sender, e.g. "Showbook <digest@showbook.app>".
#  - ADMIN_EMAILS — comma-separated recipient list for the alert.
# When all three are set, the failure step (shared script:
# scripts/mobile-deploy-failure-email.sh) emails the eas-cli error
# summary plus a direct link to the EAS build page on any deploy
# failure, so you don't have to hunt for the Expo link in the Actions
# log and log into expo.dev to see what broke.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "update (OTA JS) or build (new native binary; pauses at the mobile-release approval gate, then auto-submits to Play internal / TestFlight)"
        type: choice
        options:
          - update
          - build
        default: update
      platform:
        description: "Platform (only used in build mode)"
        type: choice
        options:
          - ios
          - android
          - all
        default: android
      bump:
        description: "Version bump (only used in build mode): auto scans commits since the last mobile-v* tag; none ships the version already in app.config.ts"
        type: choice
        options:
          - auto
          - patch
          - minor
          - none
        default: auto

# Read-only by default; only the release job escalates to
# contents: write (the version-bump push back to main).
permissions:
  contents: read

# Force every run step onto `bash --noprofile --norc -eo pipefail`.
# Without an explicit `shell:`, GitHub's default on Linux is `bash -e {0}`
# — NO pipefail — so the `eas-cli … | tee` pipelines below took tee's
# exit code (always 0) and a failed EAS build/submit left its step green.
# That's how the v0.3.0 release shipped nothing: both store builds failed
# remotely, every step still passed, the submit steps re-submitted the
# previous 0.2.0 binaries (both stores rejected them — also silently),
# and the failure email never fired because the job "succeeded".
defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Decide OTA vs build
    # workflow_run: only deploy if CI passed AND was on main AND wasn't a
    #   fork PR.
    # workflow_dispatch: always allowed (manual trigger from Actions tab).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.event != 'pull_request') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs_build: ${{ steps.detect-native.outputs.needs_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Full history so HEAD~1 resolves for the native-change diff.
          # With the old default fetch-depth: 1, HEAD~1 didn't resolve
          # and every trigger silently took the OTA path — PR #457
          # post-mortem.
          fetch-depth: 0

      # Native changes (anything that gets baked into the iOS/Android binary)
      # can't be shipped via `eas update` — OTA only swaps the JS bundle, so
      # any new permission, plugin config, autolinked module, embedded asset,
      # or local Expo Module source has to ride a fresh `eas build`. We watch
      # the paths that actually flow into the native binary; everything else
      # under `apps/mobile/` (app/, components/, lib/, web-shims/, web-tests/,
      # e2e/, tests/, docs) is OTA-shippable.
      #
      # Paths that force a build:
      #   - apps/mobile/package.json       — npm deps incl. native autolinking
      #   - apps/mobile/app.config.ts      — plugin list, permissions, version,
      #                                      android.blockedPermissions, etc.
      #   - apps/mobile/eas.json           — env / build profile / channel
      #   - apps/mobile/modules/**         — local Expo Module sources (their
      #                                      JS is embedded into the AAB)
      #   - apps/mobile/assets/**          — icon / splash / adaptive-icon
      #                                      get bundled into the binary
      #
      # Why widen this: when `apps/mobile/modules/showbook-spotify-sdk/src/`
      # was patched (PR #454) to stop crashing at startup, the previous
      # narrow check only looked at apps/mobile/package.json, so the deploy
      # took the OTA path. The OTA-shipped bundle never reached devices
      # because the embedded broken bundle crashed before expo-updates could
      # apply the swap. Watching apps/mobile/modules/ catches that class of
      # change.
      - name: Detect native changes
        id: detect-native
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
              'apps/mobile/package.json' \
              'apps/mobile/app.config.ts' \
              'apps/mobile/eas.json' \
              'apps/mobile/modules/' \
              'apps/mobile/assets/' \
              || true)
            if [ -n "$CHANGED" ]; then
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
              {
                echo "### Native-affecting paths changed — routing to the gated release job"
                echo ""
                echo '```'
                echo "$CHANGED"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            else
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # No parent commit available — checkout was shallower than
            # expected. Fail-safe to a build: skipping a needed binary
            # ships a broken update (PR #457 post-mortem), shipping an
            # unnecessary one costs ~15 min of EAS time (and now also a
            # one-click approval). Asymmetric cost argues for build.
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            {
              echo "### HEAD~1 unresolvable — defaulting to build"
              echo ""
              echo "The Checkout step's fetch-depth left no parent commit to diff"
              echo "against, so the OTA-vs-build decision can't be made from the"
              echo "diff. Falling through to build so a needed native change can't"
              echo "silently ship as OTA. Investigate the Checkout step's"
              echo "fetch-depth if this fires on a routine push."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  ota:
    name: Push OTA update
    needs: plan
    if: >-
      (github.event_name == 'workflow_run' && needs.plan.outputs.needs_build != 'true')
      || (github.event_name == 'workflow_dispatch' && inputs.mode == 'update')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Separate group from the release job so a release parked at the
    # approval gate can never block JS-only deploys from later merges.
    concurrency:
      group: mobile-deploy-ota
      cancel-in-progress: false
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push OTA update
        working-directory: apps/mobile
        env:
          # `eas update` does NOT read the eas.json build profile `env` block
          # — that's a build-only feature. For OTA updates the env vars must
          # be set in the shell so Metro inlines them into the JS bundle. We
          # mirror the values from eas.json's preview profile here. These are
          # public client IDs / URLs (the EXPO_PUBLIC_ prefix means they ship
          # in the JS bundle anyway), so committing them is safe.
          EXPO_PUBLIC_API_URL: https://showbook.ethanasm.me
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: 222563763412-v5hj97rgnhnl2uesff3kvefvn2n4na2a.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: 222563763412-noa32760ohv25v56b8kka0ba9rf49529.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: 222563763412-i4g7a2t7to8qce4oa9j0msmhk9bmejal.apps.googleusercontent.com
        run: |
          MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%s)
          # Combined stdout+stderr is tee'd to a shared log so the
          # `if: failure()` notifier can email the eas-cli error summary.
          # pipefail comes from the workflow-level `defaults.run.shell:
          # bash` (the implicit default shell has NO pipefail), so a
          # failed eas-cli still fails the step despite the tee.
          pnpm dlx eas-cli update \
            --branch preview \
            --message "$MSG" \
            --non-interactive 2>&1 | tee -a "$GITHUB_WORKSPACE/eas-output.log"

      - name: Email error logs on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Mirror the names used in .env.prod so the values can be copied
          # straight across: EMAIL_FROM is the verified Resend sender,
          # ADMIN_EMAILS is the comma-separated recipient list.
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ALERT_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TRIGGER: ${{ github.event_name }}
          MODE: update
        run: bash scripts/mobile-deploy-failure-email.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Mobile deploy (OTA)"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Mode: update"
            echo "- Status: ${{ job.status }}"
            echo "- Channel: preview"
            echo "- Version: unchanged (OTA)"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build + submit to stores (gated)
    needs: plan
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'build')
      || (github.event_name == 'workflow_run' && needs.plan.outputs.needs_build == 'true')
    runs-on: ubuntu-latest
    # THE RELEASE GATE. With a required reviewer configured on this
    # environment (Settings → Environments → mobile-release), the job
    # waits here — before the version bump, the EAS builds, and the
    # store submits — until someone approves the pending deployment.
    # Approvals can come from the run page, the notification email, or
    # the GitHub mobile app. Without protection rules the environment
    # is pass-through (fail-open) and behaves exactly like the old
    # ungated deploy. See docs/specs/mobile-deployment.md → "Release
    # approval gate".
    environment: mobile-release
    # Separate group from the OTA job (see header). cancel-in-progress
    # stays false so an approved, in-flight build isn't killed by the
    # next merge; a not-yet-approved run superseded by a newer one is
    # expendable either way (range-based version scan).
    concurrency:
      group: mobile-deploy-release
      cancel-in-progress: false
    # contents: write is needed by the `Bump app version` step to push
    # the version-bump commit + mobile-v* tag back to main.
    permissions:
      contents: write
    # 75 min covers a fresh Android build (~10-15 min on EAS) plus an
    # iOS build (~15-25 min) plus the synchronous submit steps (~1-2
    # min each), run sequentially. 45 min was the Android-submit-only
    # budget back when iOS was a fire-and-forget --no-wait kickoff.
    # (Time spent waiting at the approval gate does not count — the
    # job timeout starts when the job starts, i.e. after approval.)
    timeout-minutes: 75
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # main's ruleset requires PRs, which rejects GITHUB_TOKEN pushes
          # — that's what failed the first bump run. The built-in
          # github-actions app can NOT be put on a ruleset bypass list
          # (GitHub limitation), so the bump-back push authenticates with
          # one of these instead, in preference order:
          #  1. RELEASE_DEPLOY_KEY — private half of a repo deploy key
          #     with write access; "Deploy keys" is checked in the
          #     ruleset's bypass list. Keys don't expire. When set,
          #     checkout switches the remote to SSH and pushes
          #     authenticate as the deploy key.
          #  2. RELEASE_PUSH_TOKEN — fine-grained PAT (Contents:
          #     read/write) from an actor on the bypass list (e.g. the
          #     Repository admin role).
          #  3. GITHUB_TOKEN fallback — can fetch, but its bump push WILL
          #     be rejected while the required-PR rule has no usable
          #     bypass for it; the bump step then fails with the remedy.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          token: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}
          # Full history + tags: `Bump app version` finds the last
          # `mobile-v*` tag and scans the commit subjects since it for
          # conventional-commit prefixes, then pushes a bump commit back
          # to main — both need full history and tags.
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs only after the environment approval. Decides the bump type,
      # edits app.config.ts via scripts/bump-mobile-version.mjs, commits
      # + tags `mobile-vX.Y.Z`, and pushes back to main so the repo
      # stays the source of truth for the version AND the OTA runtime.
      # The push happens BEFORE `eas build` so a binary can never ship
      # with a version git doesn't know about; if the push can't land,
      # the job fails (and the failure email fires) rather than building
      # anyway. A rejected approval never reaches this step, so skipped
      # releases leave no bump commit and no tag behind.
      - name: Bump app version
        id: bump-version
        env:
          BUMP_INPUT: ${{ inputs.bump || 'auto' }}
        run: |
          set -euo pipefail

          # Safety: the bump-back targets main. If this run was dispatched
          # from a non-main ref, ship whatever version is in the file
          # instead of pushing a bump from foreign history onto main.
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::warning::HEAD is not on main — skipping version bump, building with the version already in app.config.ts."
            echo "version=$(node scripts/bump-mobile-version.mjs --print)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="$BUMP_INPUT"

          # Respect a manual bump: if the triggering commit already changed
          # the version line (e.g. the deliberate 1.0.0 jump), don't
          # double-bump on top of it.
          # (Here and below: grep without -q / sed instead of head, so the
          # reader drains its pipe. Under pipefail a reader that exits
          # early can SIGPIPE the producer and turn a matching condition
          # false — or fail the LAST_TAG assignment outright.)
          if git diff HEAD~1 HEAD -- apps/mobile/app.config.ts | grep -E "^[+-][[:space:]]*version: '" >/dev/null; then
            echo "Version line changed in the triggering commit — respecting the manual bump."
            BUMP=none
          fi

          # Highest existing release tag, by version sort (not reachability
          # — a queued run whose head_sha predates the previous run's bump
          # commit must still see that run's tag).
          LAST_TAG=$(git tag -l 'mobile-v*' --sort=-v:refname | sed -n 1p)

          if [ "$BUMP" = "auto" ]; then
            # Conventional-commit scan over the squash-merge subjects on
            # main since the last release tag (every commit in that range
            # rides this binary, including ones already OTA-shipped, and
            # ones whose release run was skipped at the approval gate).
            # feat: → minor; a breaking marker (type!: ) → major, which
            # the bump script maps to minor while we're pre-1.0 (D25).
            # Anything unprefixed → patch. First-ever run (no tag yet)
            # scans just the triggering commit.
            RANGE="${LAST_TAG:+${LAST_TAG}..HEAD}"
            RANGE="${RANGE:-HEAD~1..HEAD}"
            SUBJECTS=$(git log --format=%s "$RANGE" -- || true)
            if echo "$SUBJECTS" | grep -E '^[a-z]+(\([^)]*\))?!:' >/dev/null; then
              BUMP=major
            elif echo "$SUBJECTS" | grep -iE '^feat(\([^)]*\))?:' >/dev/null; then
              BUMP=minor
            else
              BUMP=patch
            fi
            echo "Scanned ${RANGE} → bump type: ${BUMP}"
          fi

          if [ "$BUMP" = "none" ]; then
            VERSION=$(node scripts/bump-mobile-version.mjs --print)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "### Version: ${VERSION} (no auto-bump)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FLOOR="${LAST_TAG#mobile-v}"
          NEW=$(node scripts/bump-mobile-version.mjs --type "$BUMP" ${LAST_TAG:+--floor "$FLOOR"})
          # Tag collision means a racing run already used this version —
          # keep patching forward until the slot is free.
          while git rev-parse -q --verify "refs/tags/mobile-v$NEW" >/dev/null; do
            NEW=$(node scripts/bump-mobile-version.mjs --type patch)
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add apps/mobile/app.config.ts
          # [skip ci] matters: when RELEASE_PUSH_TOKEN (a PAT) does the
          # push, the push WOULD trigger the CI workflow — [skip ci]
          # suppresses that, and the deploy itself only runs off CI
          # completion or manual dispatch, so the bump commit can't
          # re-trigger either workflow. (With the GITHUB_TOKEN fallback,
          # pushes never trigger workflows at all.)
          git commit -m "chore(release): mobile v${NEW} [skip ci]"
          git tag "mobile-v${NEW}"
          # --atomic: the commit and the tag land together or not at all.
          # The first bump run pushed non-atomically and branch protection
          # rejected main AFTER the tag ref was accepted, leaving an
          # orphan mobile-v0.1.2 tag pointing at a commit main never got.
          for i in 1 2 3; do
            if git push --atomic origin main "mobile-v${NEW}" 2>&1 | tee /tmp/bump-push.log; then
              break
            fi
            # A branch-protection rejection is a configuration problem,
            # not a push race — retrying can't fix it. Fail immediately
            # with the remedy spelled out.
            if grep -qiE 'protected branch|GH006|GH013' /tmp/bump-push.log; then
              echo "::error::main's protection rejected the version-bump push. The built-in github-actions app cannot be added to a ruleset bypass list, so configure one of: (1) recommended — check 'Deploy keys' in the ruleset's bypass list, add a write-access deploy key to the repo, and save its private key as the RELEASE_DEPLOY_KEY secret; (2) a PAT from a bypass-listed actor as RELEASE_PUSH_TOKEN. Details: docs/specs/mobile-deployment.md → Versioning."
              exit 1
            fi
            if [ "$i" = 3 ]; then
              echo "Could not push the version-bump commit after 3 attempts." >&2
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
          done

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "### Version: ${NEW} (${BUMP} bump, tagged mobile-v${NEW})" >> "$GITHUB_STEP_SUMMARY"

      # Android build + Play submit are split into two steps so we can fail
      # the submit independently of the build (e.g. missing service account
      # secret) and so the build's --wait keeps the artifact handle around
      # for `eas submit --latest` to find. The `preview-store` build profile
      # produces an AAB (`buildType: app-bundle`, `distribution: store`) that
      # Play accepts, while inheriting the `preview` channel + OAuth env from
      # `preview` so OTA updates still reach Play-installed copies.
      - name: Build Android AAB (preview-store profile)
        id: build-android
        # workflow_run releases build both platforms; dispatch respects
        # the platform input.
        if: >-
          github.event_name == 'workflow_run'
          || inputs.platform == 'android' || inputs.platform == 'all'
        working-directory: apps/mobile
        run: |
          pnpm dlx eas-cli build \
            --profile preview-store \
            --platform android \
            --non-interactive \
            --wait 2>&1 | tee -a "$GITHUB_WORKSPACE/eas-output.log"

      - name: Submit Android AAB to Play internal track
        # Gate on build-android succeeding so a build failure doesn't leak
        # a misleading "submit failed" line. `if: always()` would also catch
        # skipped — guard explicitly on outcome.
        if: steps.build-android.outcome == 'success'
        working-directory: apps/mobile
        env:
          PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${PLAY_SA_JSON:-}" ]; then
            echo "PLAY_SERVICE_ACCOUNT_JSON secret is not set — cannot submit to Play." >&2
            echo "See workflow header comment for setup." >&2
            exit 1
          fi
          # eas-cli doesn't accept --key / --service-account-key-path as a
          # submit flag in current versions — the path has to come from the
          # submit profile in eas.json (`serviceAccountKeyPath`, relative to
          # eas.json itself). We write the secret to that exact relative path
          # in the working directory (which is `apps/mobile/`), chmod it, and
          # let `eas submit --profile preview-store` resolve the path the
          # standard way.
          SA="./play-service-account.json"
          # printf, not echo, so a trailing newline doesn't break JSON parsing
          # on EAS's side. The file is on the ephemeral runner only and is
          # gitignored at the repo level so a misconfigured `git add` can't
          # commit it.
          printf '%s' "$PLAY_SA_JSON" > "$SA"
          chmod 600 "$SA"
          pnpm dlx eas-cli submit \
            --profile preview-store \
            --platform android \
            --latest \
            --non-interactive 2>&1 | tee -a "$GITHUB_WORKSPACE/eas-output.log"
          # Best-effort cleanup; runner is ephemeral anyway.
          rm -f "$SA"

      # iOS mirrors the Android build/submit split above. The
      # `preview-store` profile produces an App Store-signed IPA
      # (`distribution: store`) that App Store Connect accepts, while
      # inheriting the `preview` channel + OAuth env from `preview` so
      # OTA updates still reach TestFlight-installed copies. --wait
      # replaces the old fire-and-forget --no-wait kickoff so
      # `eas submit --latest` has a finished artifact to find.
      # Prereq (one-time, interactive): the App Store distribution
      # certificate + provisioning profile must already be in EAS
      # credentials — run `eas build --profile preview-store --platform
      # ios` once locally to let EAS generate them; CI can't answer the
      # credential prompts.
      - name: Build iOS IPA (preview-store profile)
        id: build-ios
        if: >-
          github.event_name == 'workflow_run'
          || inputs.platform == 'ios' || inputs.platform == 'all'
        working-directory: apps/mobile
        run: |
          pnpm dlx eas-cli build \
            --profile preview-store \
            --platform ios \
            --non-interactive \
            --wait 2>&1 | tee -a "$GITHUB_WORKSPACE/eas-output.log"

      - name: Submit iOS IPA to TestFlight internal testing
        # Same outcome-gating rationale as the Android submit step.
        if: steps.build-ios.outcome == 'success'
        working-directory: apps/mobile
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          for v in ASC_API_KEY_P8 ASC_API_KEY_ID ASC_API_KEY_ISSUER_ID ASC_APP_ID; do
            if [ -z "${!v:-}" ]; then
              echo "$v secret is not set — cannot submit to TestFlight." >&2
              echo "See workflow header comment for setup." >&2
              exit 1
            fi
          done
          # Like the Android step, the key file path has to come from the
          # submit profile in eas.json (`ascApiKeyPath`, relative to
          # eas.json itself) — write the secret to that exact path. The
          # key ID / issuer ID / ASC app ID also have no CLI flag and
          # eas.json has no env-var substitution, so inject them into the
          # submit profile with jq. The edit only lives on the ephemeral
          # runner; the .p8 itself is gitignored at the repo level so a
          # misconfigured `git add` can't commit it.
          KEY="./asc-api-key.p8"
          printf '%s' "$ASC_API_KEY_P8" > "$KEY"
          chmod 600 "$KEY"
          jq --arg keyId "$ASC_API_KEY_ID" \
             --arg issuerId "$ASC_API_KEY_ISSUER_ID" \
             --arg appId "$ASC_APP_ID" \
             '.submit."preview-store".ios += {ascApiKeyId: $keyId, ascApiKeyIssuerId: $issuerId, ascAppId: $appId}' \
             eas.json > eas.json.tmp && mv eas.json.tmp eas.json
          pnpm dlx eas-cli submit \
            --profile preview-store \
            --platform ios \
            --latest \
            --non-interactive 2>&1 | tee -a "$GITHUB_WORKSPACE/eas-output.log"
          # Best-effort cleanup; runner is ephemeral anyway.
          rm -f "$KEY"
          git checkout -- eas.json || true

      - name: Email error logs on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Mirror the names used in .env.prod so the values can be copied
          # straight across: EMAIL_FROM is the verified Resend sender,
          # ADMIN_EMAILS is the comma-separated recipient list.
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ALERT_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TRIGGER: ${{ github.event_name }}
          MODE: build
        run: bash scripts/mobile-deploy-failure-email.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Mobile deploy (store release)"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Mode: build"
            echo "- Status: ${{ job.status }}"
            echo "- Channel: preview"
            echo "- Version: ${{ steps.bump-version.outputs.version || 'unknown' }}"
          } >> "$GITHUB_STEP_SUMMARY"
