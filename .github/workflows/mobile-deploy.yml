name: Mobile Deploy (preview)

# Continuous mobile deployment. Every CI-green push to `main` runs
# `eas update --branch preview`, which pushes a fresh JS bundle to
# the preview channel. Installed preview builds pick it up on next
# cold start.
#
# For changes that need a new native binary (added Expo plugin, new
# native dep, new permission string), use the workflow_dispatch
# button with mode=build to kick off a full `eas build`. Native dep
# changes detected against the parent commit also auto-promote a
# workflow_run trigger from OTA to build.
#
# **Android builds auto-submit to the Play Console internal testing
# track** (via `eas submit`) using the service account JSON in the
# `PLAY_SERVICE_ACCOUNT_JSON` secret. Testers on Play Internal pick
# up the new build through the Play Store once Google finishes
# processing the upload — no sideload, no Advanced Protection
# friction. iOS still produces a plain preview IPA; auto-submit on
# the iOS side waits on an Apple Developer account.
#
# Runs on a GitHub-hosted runner — EAS Build/Submit/Update all
# execute in Expo's cloud, so there's nothing to host locally. The
# prod box is not involved.
#
# Required secrets (Settings → Secrets → Actions):
#  - EXPO_TOKEN — `eas-cli token:create` or expo.dev → Account
#    Settings → Access Tokens. Drives `eas update` + `eas build`.
#  - PLAY_SERVICE_ACCOUNT_JSON — full JSON contents of the Google
#    service-account key with Play Console "Manage testing track
#    releases" permission on the Showbook app. Without it the
#    Android submit step fails fast (intentionally — better than
#    silently shipping nothing).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "update (OTA JS) or build (new native binary; Android auto-submits to Play internal)"
        type: choice
        options:
          - update
          - build
        default: update
      platform:
        description: "Platform (only used in build mode)"
        type: choice
        options:
          - ios
          - android
          - all
        default: android

permissions:
  contents: read

concurrency:
  group: mobile-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Push to preview channel
    # workflow_run: only deploy if CI passed AND was on main AND wasn't a
    #   fork PR.
    # workflow_dispatch: always allowed (manual trigger from Actions tab).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.event != 'pull_request') }}
    runs-on: ubuntu-latest
    # 45 min covers a fresh Android build (~10-15 min on EAS) plus the
    # synchronous submit step (~1-2 min) plus an iOS build kickoff
    # (--no-wait). 25 min was the fire-and-forget-only budget.
    timeout-minutes: 45
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Native changes (anything that gets baked into the iOS/Android binary)
      # can't be shipped via `eas update` — OTA only swaps the JS bundle, so
      # any new permission, plugin config, autolinked module, embedded asset,
      # or local Expo Module source has to ride a fresh `eas build`. We watch
      # the paths that actually flow into the native binary; everything else
      # under `apps/mobile/` (app/, components/, lib/, web-shims/, web-tests/,
      # e2e/, tests/, docs) is OTA-shippable.
      #
      # Paths that force a build:
      #   - apps/mobile/package.json       — npm deps incl. native autolinking
      #   - apps/mobile/app.config.ts      — plugin list, permissions, version,
      #                                      android.blockedPermissions, etc.
      #   - apps/mobile/eas.json           — env / build profile / channel
      #   - apps/mobile/modules/**         — local Expo Module sources (their
      #                                      JS is embedded into the AAB)
      #   - apps/mobile/assets/**          — icon / splash / adaptive-icon
      #                                      get bundled into the binary
      #
      # Why widen this: when `apps/mobile/modules/showbook-spotify-sdk/src/`
      # was patched (PR #454) to stop crashing at startup, the previous
      # narrow check only looked at apps/mobile/package.json, so the deploy
      # took the OTA path. The OTA-shipped bundle never reached devices
      # because the embedded broken bundle crashed before expo-updates could
      # apply the swap. Watching apps/mobile/modules/ catches that class of
      # change.
      - name: Detect native changes
        id: detect-native
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
              'apps/mobile/package.json' \
              'apps/mobile/app.config.ts' \
              'apps/mobile/eas.json' \
              'apps/mobile/modules/' \
              'apps/mobile/assets/' \
              || true)
          else
            CHANGED=""
          fi
          if [ -n "$CHANGED" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Native-affecting paths changed — forcing build"
              echo ""
              echo '```'
              echo "$CHANGED"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push OTA update
        if: >-
          (github.event_name == 'workflow_run' && steps.detect-native.outputs.needs_build != 'true')
          || (github.event_name == 'workflow_dispatch' && inputs.mode == 'update')
        working-directory: apps/mobile
        env:
          # `eas update` does NOT read the eas.json build profile `env` block
          # — that's a build-only feature. For OTA updates the env vars must
          # be set in the shell so Metro inlines them into the JS bundle. We
          # mirror the values from eas.json's preview profile here. These are
          # public client IDs / URLs (the EXPO_PUBLIC_ prefix means they ship
          # in the JS bundle anyway), so committing them is safe.
          EXPO_PUBLIC_API_URL: https://showbook.ethanasm.me
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: 222563763412-v5hj97rgnhnl2uesff3kvefvn2n4na2a.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: 222563763412-noa32760ohv25v56b8kka0ba9rf49529.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: 222563763412-i4g7a2t7to8qce4oa9j0msmhk9bmejal.apps.googleusercontent.com
        run: |
          MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%s)
          pnpm dlx eas-cli update \
            --branch preview \
            --message "$MSG" \
            --non-interactive

      # Android build + Play submit are split into two steps so we can fail
      # the submit independently of the build (e.g. missing service account
      # secret) and so the build's --wait keeps the artifact handle around
      # for `eas submit --latest` to find. The `preview-store` build profile
      # produces an AAB (`buildType: app-bundle`, `distribution: store`) that
      # Play accepts, while inheriting the `preview` channel + OAuth env from
      # `preview` so OTA updates still reach Play-installed copies.
      - name: Build Android AAB (preview-store profile)
        id: build-android
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'build'
            && (inputs.platform == 'android' || inputs.platform == 'all'))
          || (github.event_name == 'workflow_run' && steps.detect-native.outputs.needs_build == 'true')
        working-directory: apps/mobile
        run: |
          pnpm dlx eas-cli build \
            --profile preview-store \
            --platform android \
            --non-interactive \
            --wait

      - name: Submit Android AAB to Play internal track
        # Gate on build-android succeeding so a build failure doesn't leak
        # a misleading "submit failed" line. `if: always()` would also catch
        # skipped — guard explicitly on outcome.
        if: steps.build-android.outcome == 'success'
        working-directory: apps/mobile
        env:
          PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${PLAY_SA_JSON:-}" ]; then
            echo "PLAY_SERVICE_ACCOUNT_JSON secret is not set — cannot submit to Play." >&2
            echo "See workflow header comment for setup." >&2
            exit 1
          fi
          # eas-cli doesn't accept --key / --service-account-key-path as a
          # submit flag in current versions — the path has to come from the
          # submit profile in eas.json (`serviceAccountKeyPath`, relative to
          # eas.json itself). We write the secret to that exact relative path
          # in the working directory (which is `apps/mobile/`), chmod it, and
          # let `eas submit --profile preview-store` resolve the path the
          # standard way.
          SA="./play-service-account.json"
          # printf, not echo, so a trailing newline doesn't break JSON parsing
          # on EAS's side. The file is on the ephemeral runner only and is
          # gitignored at the repo level so a misconfigured `git add` can't
          # commit it.
          printf '%s' "$PLAY_SA_JSON" > "$SA"
          chmod 600 "$SA"
          pnpm dlx eas-cli submit \
            --profile preview-store \
            --platform android \
            --latest \
            --non-interactive
          # Best-effort cleanup; runner is ephemeral anyway.
          rm -f "$SA"

      - name: Build iOS IPA (preview profile)
        # iOS keeps the fire-and-forget --no-wait pattern: no auto-submit
        # path yet (needs an Apple Developer account + App Store Connect
        # API key), so there's nothing for the runner to do after kickoff.
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'build'
            && (inputs.platform == 'ios' || inputs.platform == 'all'))
          || (github.event_name == 'workflow_run' && steps.detect-native.outputs.needs_build == 'true')
        working-directory: apps/mobile
        run: |
          pnpm dlx eas-cli build \
            --profile preview \
            --platform ios \
            --non-interactive \
            --no-wait

      - name: Summary
        if: always()
        run: |
          {
            echo "### Mobile deploy"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Mode: ${{ inputs.mode || 'update' }}"
            echo "- Status: ${{ job.status }}"
            echo "- Channel: preview"
          } >> "$GITHUB_STEP_SUMMARY"
