name: Mobile Deploy (preview)

# Continuous mobile deployment. Every CI-green push to `main` runs
# `eas update --branch preview`, which pushes a fresh JS bundle to
# the preview channel. Installed preview IPAs pick it up on next
# cold start.
#
# For changes that need a new native binary (added Expo plugin, new
# native dep, new permission string), use the workflow_dispatch
# button with mode=build to kick off a full `eas build` instead.
# That produces a new IPA you have to install on the phone again.
#
# Runs on a GitHub-hosted runner — EAS Build/Update both execute in
# Expo's cloud, so there's nothing to host locally. The prod box is
# not involved.
#
# Required secret: EXPO_TOKEN (Settings → Secrets → Actions). Create
# via `eas-cli token:create` or expo.dev → Account Settings → Access
# Tokens.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "update (OTA JS) or build (new IPA)"
        type: choice
        options:
          - update
          - build
        default: update
      platform:
        description: "Platform (only used in build mode)"
        type: choice
        options:
          - ios
          - android
          - all
        default: ios

permissions:
  contents: read

concurrency:
  group: mobile-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Push to preview channel
    # workflow_run: only deploy if CI passed AND was on main AND wasn't a
    #   fork PR.
    # workflow_dispatch: always allowed (manual trigger from Actions tab).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.event != 'pull_request') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Native deps (anything that runs Expo autolinking on iOS/Android) can't
      # be shipped via `eas update` — those updates only swap the JS bundle.
      # If `apps/mobile/package.json` deps changed between this commit and its
      # parent, we promote a workflow_run trigger from OTA to a full
      # `eas build` so the preview channel actually ships the new binary.
      - name: Detect native dep changes
        id: detect-native
        run: |
          # Compare apps/mobile/package.json dependencies between HEAD and its
          # parent commit. If any dependency line changed, force build mode.
          # `git diff -U0` keeps the diff tight; we filter to the dependencies
          # block by looking for the standard "  \"package-name\":" pattern.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            DIFF=$(git diff HEAD~1 HEAD -- apps/mobile/package.json || true)
          else
            DIFF=""
          fi
          if echo "$DIFF" | grep -qE '^[-+]\s*"[^"]+":\s*"'; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Native deps changed in apps/mobile/package.json — forcing build." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push OTA update
        if: >-
          (github.event_name == 'workflow_run' && steps.detect-native.outputs.needs_build != 'true')
          || (github.event_name == 'workflow_dispatch' && inputs.mode == 'update')
        working-directory: apps/mobile
        env:
          # `eas update` does NOT read the eas.json build profile `env` block
          # — that's a build-only feature. For OTA updates the env vars must
          # be set in the shell so Metro inlines them into the JS bundle. We
          # mirror the values from eas.json's preview profile here. These are
          # public client IDs / URLs (the EXPO_PUBLIC_ prefix means they ship
          # in the JS bundle anyway), so committing them is safe.
          EXPO_PUBLIC_API_URL: https://showbook.ethanasm.me
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_IOS: 222563763412-v5hj97rgnhnl2uesff3kvefvn2n4na2a.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_ANDROID: 222563763412-noa32760ohv25v56b8kka0ba9rf49529.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_OAUTH_CLIENT_ID_WEB: 222563763412-i4g7a2t7to8qce4oa9j0msmhk9bmejal.apps.googleusercontent.com
        run: |
          MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=%s)
          pnpm dlx eas-cli update \
            --branch preview \
            --message "$MSG" \
            --non-interactive

      - name: Build native IPA / APK
        # Two ways to land here:
        #   1. Manual workflow_dispatch with mode=build (user chose the platform).
        #   2. Auto-detected native dep change on a workflow_run trigger — we
        #      can't pick a single platform safely in that case, so we build
        #      both so neither phone falls behind.
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'build')
          || (github.event_name == 'workflow_run' && steps.detect-native.outputs.needs_build == 'true')
        working-directory: apps/mobile
        env:
          AUTO_PLATFORM: ${{ steps.detect-native.outputs.needs_build == 'true' && 'all' || inputs.platform }}
        run: |
          pnpm dlx eas-cli build \
            --profile preview \
            --platform "$AUTO_PLATFORM" \
            --non-interactive \
            --no-wait

      - name: Summary
        if: always()
        run: |
          {
            echo "### Mobile deploy"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Mode: ${{ inputs.mode || 'update' }}"
            echo "- Status: ${{ job.status }}"
            echo "- Channel: preview"
          } >> "$GITHUB_STEP_SUMMARY"
