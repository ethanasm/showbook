name: Web Deploy (prod)

# Continuous deployment for the self-hosted prod box.
#
# Trigger: CI ("CI" workflow) completes successfully on `main`.
# `workflow_run` runs in the repo's own context (not the PR's), so fork PRs
# cannot trigger this workflow even if their CI passes — but we still gate
# explicitly on branch + event below as a defence in depth.
#
# The self-hosted runner must:
#   - have the labels `self-hosted` AND `showbook-prod`
#   - have docker, docker compose, git, and pnpm on PATH
#   - have a checked-out prod tree at $PROD_DIR (default /opt/showbook)
#     containing a populated `.env.prod` file. The deploy fetches + resets
#     this tree to the deploy SHA, then runs `pnpm prod:up && pnpm prod:db:migrate`.
#
# See README.md → "Continuous deployment" for runner install steps.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        default: ""

# Default to read-only — the deploy job runs on a self-hosted runner that
# operates on a checked-out tree via git/docker; it doesn't need to write to
# the GitHub repo via the GITHUB_TOKEN. `packages: read` lets the runner
# log in to GHCR and pull the prebuilt prod web image that CI pushed.
permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to self-hosted prod
    # workflow_run: only deploy if CI passed AND was on main AND wasn't a fork PR.
    # workflow_dispatch: always allowed (manual trigger from the Actions tab).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main' &&
           github.event.workflow_run.event != 'pull_request') }}
    runs-on: [self-hosted, showbook-prod]
    timeout-minutes: 30
    env:
      # Override via repo-level Variables (Settings → Variables → Actions)
      # if your prod tree lives somewhere other than /opt/showbook.
      PROD_DIR: ${{ vars.PROD_DIR || '/opt/showbook' }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || inputs.sha }}
      # On macOS self-hosted runners, /usr/bin/git is a stub that delegates
      # to the developer dir selected by `xcode-select`. If the runner's
      # selected dir is full Xcode and the license hasn't been accepted,
      # every git invocation aborts with exit 69. Pinning DEVELOPER_DIR to
      # Command Line Tools avoids that prompt — its license is accepted at
      # install time and it has all we need (git, etc.). The variable is a
      # no-op on Linux runners and on Macs without CLT, where git falls
      # back to whatever's on PATH.
      DEVELOPER_DIR: /Library/Developer/CommandLineTools
    steps:
      - name: Verify prod tree
        # Check only operator-managed state pre-reset. The compose file
        # is tracked, so `git reset --hard` below produces it; checking
        # the path here would block the first deploy across the
        # docker-compose.prod.yml → infra/docker-compose.prod.yml move
        # because the old tree at PROD_DIR hasn't been reset yet.
        run: |
          set -euo pipefail
          test -d "$PROD_DIR/.git"      || { echo "PROD_DIR is not a git checkout: $PROD_DIR"; exit 1; }
          test -f "$PROD_DIR/.env.prod" || { echo ".env.prod missing in $PROD_DIR"; exit 1; }

      - name: Fetch latest main
        working-directory: ${{ env.PROD_DIR }}
        run: git fetch --prune origin main

      - name: Resolve deploy SHA
        working-directory: ${{ env.PROD_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SHA}" ]; then
            DEPLOY_SHA=$(git rev-parse origin/main)
          fi
          echo "DEPLOY_SHA=$DEPLOY_SHA" >> "$GITHUB_ENV"
          echo "Deploying $DEPLOY_SHA to $PROD_DIR"

      - name: Reset prod tree to deploy SHA
        working-directory: ${{ env.PROD_DIR }}
        run: |
          set -euo pipefail
          git reset --hard "$DEPLOY_SHA"
          # Remove untracked tracked-adjacent files but keep gitignored state
          # (.env.prod, node_modules, .next caches, etc.).
          git clean -fd

      - name: Log in to GHCR
        # `pnpm prod:up` does `docker compose pull web` against
        # ghcr.io/ethanasm/showbook-web:latest; that image lives in a
        # private GHCR package by default, so the runner needs a docker
        # login before pull. The GITHUB_TOKEN is workflow-scoped and
        # auto-expires when the job finishes.
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull + start prod containers
        working-directory: ${{ env.PROD_DIR }}
        run: pnpm prod:up

      - name: Apply DB migrations
        working-directory: ${{ env.PROD_DIR }}
        run: pnpm prod:db:migrate

      # The mobile-e2e backend (infra/docker-compose.e2e.yml) runs the
      # same :latest image as prod. Refresh it here — while this job's
      # GHCR login is still valid and right after prod:up updated the
      # local :latest tag — so the e2e backend's API never drifts from
      # prod's. Guarded on .env.e2e existing (skip silently before the
      # operator has set the stack up) and non-fatal: a broken e2e
      # backend should fail the mobile-e2e workflow, not prod deploys.
      - name: Refresh e2e backend (if configured)
        working-directory: ${{ env.PROD_DIR }}
        run: |
          set -uo pipefail
          if [ ! -f .env.e2e ]; then
            echo "No .env.e2e in $PROD_DIR — skipping e2e backend refresh"
            exit 0
          fi
          if pnpm e2e:up && pnpm e2e:db:migrate; then
            echo "e2e backend refreshed"
          else
            echo "::warning::e2e backend refresh failed — mobile e2e may run against a stale backend"
          fi

      - name: Prune old images and build cache
        run: |
          set -euo pipefail
          docker image prune -f
          docker image prune -af --filter "until=720h"
          docker buildx prune -af --filter "until=720h"

      - name: Summary
        if: always()
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$PROD_DIR\`"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
