# Spotify Hype-playlist tap flow — Maestro (Phase 10 Part C1)
#
# Asserts that tapping the Hype playlist button on a stable pre-show
# without a connected Spotify account presents the SpotifyConnectSheet.
# Maestro can't walk the OAuth round-trip in CI (Spotify approval lives
# off-device); the manual smoke test on a physical iPhone covers that
# leg and is documented in the PR body.
#
# Requires:
#   - `SetlistIntelMobileV2` ON
#   - `SetlistIntelHypePlaylist` ON (the global hype-card gate)
#   - A pre-show stable-archetype fixture in the seeded test DB
appId: me.ethanasm.showbook
name: spotify-hype
tags:
  - phase-10
  - setlist-intel
  - spotify
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

# The CTA sits at the bottom of the sign-in ScrollView; accept partial
# visibility + let each scroll settle so a cold-launch where it lands
# under the gesture nav doesn't time out at the default 100%. See
# sign-in.yaml for the full rationale.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN
    visibilityPercentage: 60
    waitToSettleTimeoutMs: 500
    timeout: 30000

- tapOn:
    text: "Sign in with Google"

- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      # The first-run flow now shows a variable number of steps: the
      # region step is dropped when the user already has a region and
      # the gmail step when they already have shows (the persisted
      # Maestro show makes hasShows true here, so onboarding is < 4
      # screens). Tap "Skip" until no step screen remains instead of a
      # fixed count, so the loop is resilient to the step total.
      - repeat:
          while:
            visible: "Skip"
          commands:
            - tapOn: "Skip"

- tapOn:
    text: "Shows"
- tapOn:
    id: "show-card-row-0"
- tapOn:
    id: "show-tab-setlist"

# Tap the primary Hype-playlist button. testID is
# `hype-card-hype-primary` (pre-show) — guard with `optional: true`
# so the flow doesn't break when the seeded fixture is post-show
# (in which case the button is `hype-card-heard-primary`).
- runFlow:
    when:
      visible:
        id: "hype-card-hype-primary"
    commands:
      - tapOn:
          id: "hype-card-hype-primary"
      - assertVisible:
          id: "spotify-connect-button"
      - tapOn:
          id: "spotify-connect-cancel"

- runFlow:
    when:
      visible:
        id: "hype-card-heard-primary"
    commands:
      - tapOn:
          id: "hype-card-heard-primary"
      - assertVisible:
          id: "spotify-connect-button"
      - tapOn:
          id: "spotify-connect-cancel"
