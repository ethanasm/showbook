# Rotating-style setlist tab — Maestro (Phase 10)
#
# Asserts that a rotating-archetype show (Phish in the seeded fixture
# set) routes to the rotating setlist subtree: gap chart rows + position
# pool cards.
#
# Requires:
#   - `SetlistIntelMobileV2` ON
#   - `SetlistIntelRotatingDisplay` ON
#   - Phish (or any rotating-classified performer) seeded with a
#     pre-show date.
#
# Soft fail: if no rotating fixture is present in the test DB the flow
# short-circuits after sign-in rather than failing — the gate-blocked
# / cold-state variants are also acceptable evidence the routing is
# wired correctly.
appId: me.ethanasm.showbook
name: rotating-display
tags:
  - phase-10
  - setlist-intel
  - rotating
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

# The CTA sits at the bottom of the sign-in ScrollView; accept partial
# visibility + let each scroll settle so a cold-launch where it lands
# under the gesture nav doesn't time out at the default 100%. See
# sign-in.yaml for the full rationale.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN
    visibilityPercentage: 60
    waitToSettleTimeoutMs: 500
    timeout: 30000

- tapOn:
    text: "Sign in with Google"

- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      # The first-run flow now shows a variable number of steps: the
      # region step is dropped when the user already has a region and
      # the gmail step when they already have shows (the persisted
      # Maestro show makes hasShows true here, so onboarding is < 4
      # screens). Tap "Skip" until no step screen remains instead of a
      # fixed count, so the loop is resilient to the step total.
      - repeat:
          while:
            visible: "Skip"
          commands:
            - tapOn: "Skip"

- tapOn:
    text: "Shows"

# Phish only appears when the operator has seeded the fixture; skip
# the flow gracefully otherwise.
- runFlow:
    when:
      visible: "Phish"
    commands:
      - tapOn:
          text: "Phish"

      - assertVisible:
          id: "show-tabs-header"

      - tapOn:
          id: "show-tab-setlist"

      - assertVisible:
          id: "rotating-setlist-view|rotating-gate-blocked|setlist-tab-cold-no_corpus"
