# Rotating-style setlist tab — Maestro Cloud (Phase 10)
#
# Asserts that a rotating-archetype show (Phish in the seeded fixture
# set) routes to the rotating setlist subtree: gap chart rows + position
# pool cards, and that the SI-05 hide rule keeps the Hype playlist card
# off the Setlist tab.
#
# Requires:
#   - `SetlistIntelMobileV2` ON
#   - `SetlistIntelRotatingDisplay` ON
#   - Phish (or any rotating-classified performer) seeded with a
#     pre-show date.
appId: com.showbook.app
name: rotating-display
tags:
  - phase-10
  - setlist-intel
  - rotating
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

- runScript:
    file: ../scripts/seed-session.js
    env:
      MAESTRO_E2E_TOKEN: ${MAESTRO_E2E_TOKEN}
      MAESTRO_E2E_USER_JSON: ${MAESTRO_E2E_USER_JSON}

- openLink: ${output.seedDeeplink}

- launchApp:
    clearState: false

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Continue"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"

# Search for a rotating fixture so the flow is deterministic regardless
# of where the row lives in the user's Shows list.
- tapOn:
    text: "Shows"

- tapOn:
    text: "Phish"
    optional: true

- runFlow:
    when:
      visible:
        id: "show-tabs-header"
    commands:
      - tapOn:
          id: "show-tab-setlist"

      - assertVisible:
          id: "rotating-setlist-view|rotating-gate-blocked|setlist-tab-cold-no_corpus"
