# Stable-style setlist tab — Maestro Cloud (Phase 10)
#
# Asserts that opening a stable-archetype show pre-show renders the
# confidence banner + likely setlist grid, and that the Setlist tab
# badge carries a "%" suffix (confidence percent).
#
# Requires `SetlistIntelMobileV2` ON. The fixture comes from the seeded
# Showbook test backend — the add-show.yaml flow seeds a Foo Fighters
# show whose headliner classifies as stable.
appId: com.showbook.app
name: setlist-stable
tags:
  - phase-10
  - setlist-intel
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

- runScript:
    file: ../scripts/seed-session.js
    env:
      MAESTRO_E2E_TOKEN: ${MAESTRO_E2E_TOKEN}
      MAESTRO_E2E_USER_JSON: ${MAESTRO_E2E_USER_JSON}

- openLink: ${output.seedDeeplink}

- launchApp:
    clearState: false

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Continue"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"

- tapOn:
    text: "Shows"

- tapOn:
    id: "show-card-row-0"

- tapOn:
    id: "show-tab-setlist"

# Pre-show stable: confidence banner mounts with `STABLE archetype`
# label. Post-show: the actual-setlist banner mounts with `CONFIRMED`.
# Either one is acceptable here — both prove the Setlist tab is the
# new 4-tab variant rather than the legacy stack.
- assertVisible:
    text: "PREDICTED FROM|SOURCE OF TRUTH"
    enabled: true

- assertVisible:
    id: "show-tab-setlist-badge"

# Predicted-grid rows mount when prediction.style === 'stable' and
# core is non-empty. We allow either grid to satisfy.
- assertVisible:
    id: "predicted-setlist-row|actual-setlist-grid|setlist-tab-cold-no_corpus|setlist-tab-past-empty"
