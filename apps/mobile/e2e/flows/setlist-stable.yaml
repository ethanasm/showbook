# Stable-style setlist tab — Maestro (Phase 10)
#
# Asserts that opening a stable-archetype show pre-show renders the
# confidence banner + likely setlist grid, and that the Setlist tab
# badge mounts.
#
# Requires `SetlistIntelMobileV2` ON. Uses the e2e EAS build-profile
# bypass (EXPO_PUBLIC_E2E_TEST_TOKEN baked in) — see sign-in.yaml.
appId: me.ethanasm.showbook
name: setlist-stable
tags:
  - phase-10
  - setlist-intel
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

# The CTA sits at the bottom of the sign-in ScrollView; accept partial
# visibility + let each scroll settle so a cold-launch where it lands
# under the gesture nav doesn't time out at the default 100%. See
# sign-in.yaml for the full rationale.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN
    visibilityPercentage: 60
    waitToSettleTimeoutMs: 500
    timeout: 30000

- tapOn:
    text: "Sign in with Google"

- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      # The first-run flow now shows a variable number of steps: the
      # region step is dropped when the user already has a region and
      # the gmail step when they already have shows (the persisted
      # Maestro show makes hasShows true here, so onboarding is < 4
      # screens). Tap "Skip" until no step screen remains instead of a
      # fixed count, so the loop is resilient to the step total.
      - repeat:
          while:
            visible: "Skip"
          commands:
            - tapOn: "Skip"

- tapOn:
    text: "Shows"

- tapOn:
    id: "show-card-row-0"

- tapOn:
    id: "show-tab-setlist"

# NB: we do NOT assert `show-tab-setlist-badge` here. That pill
# (ShowTabBar.tsx renders `show-tab-${key}-badge` only when
# `badge != null`) is data-dependent — it shows a confidence % pre-show
# or a song count post-show, both of which need seeded setlist-corpus
# data. The e2e backend is keyless (no setlist.fm), so the add-show
# fixture has no corpus and the badge legitimately doesn't render.
# The assertion below is the real proof the V2 setlist tab mounted and
# it already tolerates the cold/empty state our fixture produces.

# Pre-show stable: the confidence banner mounts as
# `setlist-confidence-banner-stable`. Post-show: the actual-setlist
# banner mounts as `setlist-actual-banner`. Either one proves the
# Setlist tab is the new 4-tab variant rather than the legacy stack.
# Cold-state empties are also acceptable when the backend hasn't
# seeded a corpus for the fixture performer yet (our keyless e2e
# backend on a past show renders `setlist-tab-past-empty`).
- assertVisible:
    id: "setlist-confidence-banner-stable|setlist-actual-banner|setlist-tab-cold-no_corpus|setlist-tab-past-empty"
