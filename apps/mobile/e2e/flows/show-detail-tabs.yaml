# Show-detail 4-tab navigation — Maestro (Phase 10)
#
# Gated on `SetlistIntelMobileV2` being ON in
# packages/shared/src/feature-flags.ts. When OFF, the legacy vertical
# stack renders and the tab-id testIDs below aren't present — the flow
# fails fast on the first assertVisible.
#
# Uses the same `e2e` EAS build-profile bypass as sign-in.yaml: the
# session is baked into the build via EXPO_PUBLIC_E2E_TEST_TOKEN /
# EXPO_PUBLIC_E2E_TEST_USER_JSON, so tapping "Sign in with Google"
# falls through to the bundled session immediately.
appId: me.ethanasm.showbook
name: show-detail-tabs
tags:
  - phase-10
  - setlist-intel
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

# The CTA sits at the bottom of the sign-in ScrollView; accept partial
# visibility + let each scroll settle so a cold-launch where it lands
# under the gesture nav doesn't time out at the default 100%. See
# sign-in.yaml for the full rationale.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN
    visibilityPercentage: 60
    waitToSettleTimeoutMs: 500
    timeout: 30000

- tapOn:
    text: "Sign in with Google"

- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      # The first-run flow now shows a variable number of steps: the
      # region step is dropped when the user already has a region and
      # the gmail step when they already have shows (the persisted
      # Maestro show makes hasShows true here, so onboarding is < 4
      # screens). Tap "Skip" until no step screen remains instead of a
      # fixed count, so the loop is resilient to the step total.
      - repeat:
          while:
            visible: "Skip"
          commands:
            - tapOn: "Skip"

- assertVisible:
    text: "Shows"

# Open the Shows tab and tap into the first row. The fixture seeded by
# add-show.yaml (Maestro Test Headliner) is the most reliable target
# across back-to-back runs.
- tapOn:
    text: "Shows"

- tapOn:
    id: "show-card-row-0"

# Tabs render with `show-tab-${key}` testIDs.
- assertVisible:
    id: "show-tab-overview"
- assertVisible:
    id: "show-tab-setlist"
- assertVisible:
    id: "show-tab-media"
- assertVisible:
    id: "show-tab-notes"

# Header strip carries the testid `show-tabs-header`.
- assertVisible:
    id: "show-tabs-header"

# Tap each tab and assert the panel renders.
- tapOn:
    id: "show-tab-setlist"
- assertVisible:
    id: "show-tab-setlist"

- tapOn:
    id: "show-tab-media"
- assertVisible:
    id: "show-tab-media"

- tapOn:
    id: "show-tab-notes"
- assertVisible:
    id: "show-tab-notes"

- tapOn:
    id: "show-tab-overview"
- assertVisible:
    id: "show-tab-overview"
