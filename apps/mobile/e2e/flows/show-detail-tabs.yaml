# Show-detail 4-tab navigation — Maestro Cloud (Phase 10)
#
# Gated on `SetlistIntelMobileV2` being ON in
# packages/shared/src/feature-flags.ts. When OFF, the legacy vertical
# stack renders and the tab-id testIDs below aren't present — the flow
# fails fast on the first assertVisible.
#
# Prereq: the e2e build is signed in via the same SecureStore-seeding
# deeplink as sign-in.yaml + add-show.yaml. We seed a session here so
# the flow can run independently.
appId: com.showbook.app
name: show-detail-tabs
tags:
  - phase-10
  - setlist-intel
  - mobile-v2
---
- launchApp:
    clearState: true
    clearKeychain: true

- runScript:
    file: ../scripts/seed-session.js
    env:
      MAESTRO_E2E_TOKEN: ${MAESTRO_E2E_TOKEN}
      MAESTRO_E2E_USER_JSON: ${MAESTRO_E2E_USER_JSON}

- openLink: ${output.seedDeeplink}

- launchApp:
    clearState: false

- tapOn:
    text: "Sign in with Google"

- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Continue"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"

- assertVisible:
    text: "Shows"

# Open the Shows tab and tap into the first row. The fixture seeded by
# add-show.yaml (Foo Fighters) is the most reliable target across
# back-to-back runs.
- tapOn:
    text: "Shows"

- tapOn:
    id: "show-card-row-0"

# Tabs render with `show-tab-${key}` testIDs.
- assertVisible:
    id: "show-tab-overview"
- assertVisible:
    id: "show-tab-setlist"
- assertVisible:
    id: "show-tab-media"
- assertVisible:
    id: "show-tab-notes"

# Header strip carries the testid `show-tabs-header`.
- assertVisible:
    id: "show-tabs-header"

# Tap each tab and assert the panel renders.
- tapOn:
    id: "show-tab-setlist"
- assertVisible:
    id: "show-tab-setlist"

- tapOn:
    id: "show-tab-media"
- assertVisible:
    id: "show-tab-media"

- tapOn:
    id: "show-tab-notes"
- assertVisible:
    id: "show-tab-notes"

- tapOn:
    id: "show-tab-overview"
- assertVisible:
    id: "show-tab-overview"
