# Sign-in flow — Maestro
#
# The `e2e` build profile (apps/mobile/eas.json) sets:
#   EXPO_PUBLIC_E2E_MODE=1            — flip lib/auth.ts into bypass mode
#   EXPO_PUBLIC_E2E_TEST_TOKEN        — pre-baked Showbook JWT
#   EXPO_PUBLIC_E2E_TEST_USER_JSON    — pre-baked SessionUser JSON
#
# Those env vars are inlined at build time, so `loadE2ETestSession`
# returns the bundled session as soon as the user taps "Continue with
# Google" — no in-app deeplink seeding step, no Maestro `runScript`,
# no race. The bypass guards on EXPO_PUBLIC_E2E_MODE === '1' so the
# code path is dead in TestFlight / Play Store builds.
appId: com.showbook.app
name: sign-in
tags:
  - critical
  - auth
---
- launchApp:
    clearState: true
    clearKeychain: true

# The signin screen wraps the button in a ScrollView below a 4-card
# preview block + brand intro, so on Pixel-6-sized AVDs the CTA is
# below the fold on first paint. Scroll to it before asserting /
# tapping — Maestro's assertVisible / tapOn don't auto-scroll.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN

- assertVisible:
    text: "Sign in with Google"

- tapOn:
    text: "Sign in with Google"

# After the bypass writes the cached session and re-renders, the auth
# gate routes either to first-run welcome or directly to the tabs.
# Either landing screen is acceptable — we just need to confirm we're
# out of the sign-in screen and into the authenticated app shell.
- runFlow:
    when:
      visible: "Welcome"
    commands:
      - tapOn: "Continue"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"
      - tapOn: "Skip for now"

# expo-router renders the tab bar with the title as visible text and the
# Add tab via accessibilityLabel="Add" (no label). Match on those.
- assertVisible:
    text: "Home"
- assertVisible:
    text: "Shows"
- assertVisible:
    text: "Map"
- assertVisible:
    text: "Me"
- assertVisible:
    id: "Add"
