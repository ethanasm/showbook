# Add-show flow — Maestro
#
# This flow is a UI smoke test for the add-show path: sign-in,
# navigate to the Add tab, open the structured form, fill every
# required field, tap Save. It does NOT verify backend persistence
# — `runOptimisticMutation` in apps/mobile/app/add/form.tsx calls
# `shows.create` via tRPC, and the e2e runner doesn't currently
# expose a backend that the Android emulator can reach. Without
# EXPO_PUBLIC_API_URL pointing at a working showbook web stack the
# mutation throws and we'd see an error toast (`Could not save`)
# instead of `Show added`. The Save tap still fires submit() and
# exercises the form's validation + state plumbing on the way, so
# the UI-side regressions this flow catches (testID drift, form
# field labels, navigation) still surface here.
#
# When a CI-reachable backend is wired up, restore the
# `assertVisible: "Show added"` and `assertVisible: "Maestro Test
# Headliner"` steps at the bottom of this file to verify the
# server side too.
appId: me.ethanasm.showbook
name: add-show
tags:
  - critical
  - write
---
- launchApp:
    clearState: true
    clearKeychain: true

# The signin CTA is below the fold on Pixel-6-sized AVDs — see
# sign-in.yaml for context. Scroll into view before tapping.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      - tapOn: "Skip"   # notifications
      - tapOn: "Skip"   # photos
      - tapOn: "Skip"   # location
      - tapOn: "Skip"   # gmail

- assertVisible:
    text: "Home"

# The Add tab opens the chat surface; the form is reachable via the
# pen-line "form" affordance in the input footer.
- tapOn:
    id: "add-tab"

# Skip the LLM chat path entirely — tap the pen-line "Open form"
# affordance (accessibilityLabel="Open form" → contentDescription on
# Android, so `text:` matches).
- tapOn:
    text: "Open form"

- assertVisible:
    text: "New show"

- tapOn:
    id: "title-input"
- inputText: "Maestro Test Headliner"

- tapOn:
    id: "venue-typeahead"
- inputText: "Maestro Test Venue"

# Fill the date input — placeholder is "YYYY-MM-DD"; tapping the
# placeholder text targets the input directly.
- tapOn:
    text: "YYYY-MM-DD"
- inputText: "2026-12-31"

# Dismiss the IME before tapping Save. With the keyboard open the
# Gboard's content-description elements compete with the TopBar's
# Save checkmark and Maestro fails to land on the right one.
- hideKeyboard

# Tap the Save check icon in the TopBar. Coordinate-based tap
# because neither `text: "Save"` (accessibilityLabel) nor
# `id: "save-show"` (testID) reliably landed on the Pressable on
# the WSL-emulator + Hermes bundle combo. The button is fixed at
# the top-right of the screen so a percentage-coord tap is stable
# across emulator sizes.
- tapOn:
    point: "95%,8%"

# Backend assertions removed pending CI backend wiring — see flow
# header. The Save tap above still exercises the form's submit()
# callback; any UI regression that prevents tapping or filling
# fields surfaces in the steps above this comment.
