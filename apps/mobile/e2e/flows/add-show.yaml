# Add-show flow — Maestro
#
# End-to-end add-show path: sign-in, navigate to the Add tab, open
# the structured form, fill every required field, tap Save, verify
# the backend round-trip. `runOptimisticMutation` in
# apps/mobile/app/add/form.tsx calls `shows.create` via tRPC against
# the e2e backend stack (infra/docker-compose.e2e.yml), which the
# emulator reaches at EXPO_PUBLIC_API_URL=http://10.0.2.2:3004 — the
# emulator NAT's alias for the runner host's loopback.
#
# The created show ("Maestro Test Headliner") persists in the e2e
# database across flows and runs — show-detail-tabs / setlist-stable
# / spotify-hype rely on it as their `show-card-row-0` target. If
# the trailing assertions here fail while the form steps pass,
# suspect the backend triad first: stack down on the prod box
# (`pnpm e2e:logs`), expired / wrong-secret MAESTRO_E2E_TOKEN
# (re-mint — see apps/mobile/CLAUDE.md), or allowlist drift in
# .env.e2e. All three surface as a "Could not save show" toast on
# the form instead of the saved-confirmation card.
appId: me.ethanasm.showbook
name: add-show
tags:
  - critical
  - write
---
- launchApp:
    clearState: true
    clearKeychain: true

# The signin CTA is below the fold on Pixel-6-sized AVDs — see
# sign-in.yaml for context. Scroll into view before tapping.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      - tapOn: "Skip"   # notifications
      - tapOn: "Skip"   # photos
      - tapOn: "Skip"   # location
      - tapOn: "Skip"   # gmail

- assertVisible:
    text: "Home"

# The Add tab opens the chat surface; the form is reachable via the
# pen-line "form" affordance in the input footer.
- tapOn:
    id: "add-tab"

# Skip the LLM chat path entirely — tap the pen-line "Open form"
# affordance (accessibilityLabel="Open form" → contentDescription on
# Android, so `text:` matches).
- tapOn:
    text: "Open form"

- assertVisible:
    text: "New show"

- tapOn:
    id: "title-input"
- inputText: "Maestro Test Headliner"

- tapOn:
    id: "venue-typeahead"
- inputText: "Maestro Test Venue"

# Fill the date input — placeholder is "YYYY-MM-DD"; tapping the
# placeholder text targets the input directly.
#
# Use a PAST date on purpose: the Shows tab opens on the "Past ·
# Timeline" segment by default, and a future-dated show lands under
# "Upcoming" where neither this flow's read-back nor the downstream
# flows (which tap `show-card-row-0` in the default view) would ever
# see it. A past date puts the fixture in the default timeline as
# row-0 — exactly what show-detail-tabs.yaml / setlist-stable.yaml /
# spotify-hype.yaml rely on. (Past also gives the setlist tab a
# real "actual setlist" / cold-state to render, and the Heard-rather-
# than-Hype playlist variant, which those flows already handle.)
- tapOn:
    text: "YYYY-MM-DD"
- inputText: "2026-05-15"

# Dismiss the IME before tapping Save. With the keyboard open the
# Gboard's content-description elements compete with the TopBar's
# Save checkmark and Maestro fails to land on the right one.
- hideKeyboard

# Tap the Save check icon in the TopBar. Coordinate-based tap
# because neither `text: "Save"` (accessibilityLabel) nor
# `id: "save-show"` (testID) reliably landed on the Pressable on
# the WSL-emulator + Hermes bundle combo. The button is fixed at
# the top-right of the screen so a percentage-coord tap is stable
# across emulator sizes.
- tapOn:
    point: "95%,8%"

# Server-side persistence assertions. On an online success the form
# routes back to the Add chat tab with ?savedShowId=<server id> and
# the confirmation card (testID add-saved-confirmation) mounts — it
# only renders when `shows.create` returned a real id, so its
# presence proves the backend committed. The error path stays on the
# form and toasts "Could not save show" instead. (The card's copy is
# Groq-polished with a deterministic fallback, so assert on the
# testID, not the message text — the e2e stack runs keyless.)
- assertVisible:
    id: "add-saved-confirmation"

# Read-back through the backend: the Shows list is server-fed, so the
# new headliner appearing there proves the row survives a refetch,
# not just the optimistic cache.
- tapOn:
    text: "Shows"

- assertVisible:
    text: "Maestro Test Headliner"
