# Add-show flow — Maestro
#
# Self-contained: each flow runs from a clean keychain, so we re-tap
# the sign-in button and let the e2e-build bypass restore the bundled
# session (see sign-in.yaml for the env-var contract).
#
# Test data is deterministic: a fixed headliner, venue, and date so
# repeated runs assert the same row on Home. The Showbook test backend
# must accept arbitrary venue strings (city defaults to "Unknown" in
# apps/mobile/app/add/form.tsx when no typeahead match is selected).
appId: com.showbook.app
name: add-show
tags:
  - critical
  - write
---
- launchApp:
    clearState: true
    clearKeychain: true

# The signin CTA is below the fold on Pixel-6-sized AVDs — see
# sign-in.yaml for context. Scroll into view before tapping.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      - tapOn: "Skip"   # notifications
      - tapOn: "Skip"   # photos
      - tapOn: "Skip"   # location
      - tapOn: "Skip"   # gmail

- assertVisible:
    text: "Home"

# The Add tab opens the chat surface; the form is reachable via the
# pen-line "form" affordance in the input footer. The middle FAB tab
# has no label — it's exposed via accessibilityLabel="Add".
- tapOn:
    id: "add-tab"

# Skip the LLM chat path entirely — tap the pen-line "Open form"
# affordance to land directly on the structured form.
- tapOn:
    text: "Open form"

- assertVisible:
    text: "New show"

- tapOn:
    id: "headliner-input"
- inputText: "Maestro Test Headliner"

- tapOn:
    id: "venue-typeahead"
- inputText: "Maestro Test Venue"

# Fill the date input — placeholder is "YYYY-MM-DD"; tapping the
# placeholder text targets the input directly.
- tapOn:
    text: "YYYY-MM-DD"
- inputText: "2026-12-31"

# Dismiss the IME before tapping Save. With the keyboard open the
# Gboard's own content-description elements compete with the
# TopBar's `accessibilityLabel="Save"` checkmark and Maestro fails
# to land on the right one.
- hideKeyboard

# The Save button is an icon-only Check button in the TopBar. Use
# the testID — the accessibilityLabel="Save" text matcher proved
# unreliable when other "Save"-shaped elements are nearby (IME, etc.).
- tapOn:
    id: "save-show"

- assertVisible:
    text: "Show added"

# The success path replaces to /show/<id>; navigate back to Home and
# verify the row landed.
- tapOn:
    text: "Home"

- assertVisible:
    text: "Maestro Test Headliner"
