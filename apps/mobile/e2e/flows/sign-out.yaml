# Sign-out flow — Maestro
#
# Self-contained: signs in via the e2e bypass (see sign-in.yaml for the
# env-var contract), navigates to Me, taps Sign out, confirms the
# destructive alert, and verifies the auth gate routes back to
# /(auth)/signin once the SecureStore session is gone.
appId: com.showbook.app
name: sign-out
tags:
  - critical
  - auth
---
- launchApp:
    clearState: true
    clearKeychain: true

# The signin CTA is below the fold on Pixel-6-sized AVDs — see
# sign-in.yaml for context. Scroll into view before tapping.
- scrollUntilVisible:
    element:
      text: "Sign in with Google"
    direction: DOWN

- tapOn:
    text: "Sign in with Google"
- runFlow:
    when:
      visible: "Set up showbook"
    commands:
      - tapOn: "Set up showbook"
      - tapOn: "Skip"   # notifications
      - tapOn: "Skip"   # photos
      - tapOn: "Skip"   # location
      - tapOn: "Skip"   # gmail

- assertVisible:
    text: "Me"

- tapOn:
    text: "Me"

# Me-tab navigation is enough proof we're on the right screen; the
# old assertVisible for "ACCOUNT" against the eyebrow string
# "ACCOUNT · SETTINGS" wasn't a useful gate.

# The sign-out row scrolls into view at the bottom of the Me screen
# below 5 sections (integrations, region, sync, appearance, recent
# activity). Default 30 s should be plenty; bump anyway since the
# WSL software-rendered emulator can fling-scroll slowly.
- scrollUntilVisible:
    element:
      text: "Sign out"
    direction: DOWN
    timeout: 60000

- tapOn:
    text: "Sign out"

# Native iOS / Android Alert. Maestro matches by visible text — the
# destructive button label is also "Sign out" (see apps/mobile/app/
# (tabs)/me.tsx onSignOut). Maestro picks the most-recently-shown
# match, which is the alert button.
- assertVisible:
    text: "Are you sure you want to sign out?"

- tapOn:
    text: "Sign out"

- assertVisible:
    text: "Sign in with Google"
