<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#FFE08A" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#FFD166" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFFBE6"/>
      <stop offset="55%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#8A5E10"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="#0C0C0C"/>
  <!-- Spotlight beam: trapezoid from lamp top-left widening downward.
       Tilted slightly so the beam sweeps across the stage. -->
  <g>
    <!-- Lamp glow halo -->
    <circle cx="200" cy="180" r="220" fill="url(#lampGlow)"/>
    <!-- Beam: from the lamp (top-left) widening to the right of the stage -->
    <path d="M 168 220 L 280 156 L 952 832 L 712 920 Z" fill="url(#beam)" filter="url(#soft)"/>
    <!-- Lamp housing: stylised theater lamp (cylinder + bulb) -->
    <g transform="translate(200 180) rotate(35)">
      <rect x="-78" y="-32" width="78" height="64" rx="10" fill="#2A2A2A"/>
      <rect x="-78" y="-32" width="14" height="64" fill="#1A1A1A"/>
      <circle cx="20" cy="0" r="44" fill="url(#lamp)"/>
    </g>
  </g>
  <!-- Stage floor -->
  <line x1="120" y1="900" x2="940" y2="900" stroke="#FFD166" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round"/>
  <!-- The S, lit on stage where the beam lands -->
  <text x="624" y="820" font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif"
        font-weight="900" font-size="460" fill="#FFD166" text-anchor="middle"
        letter-spacing="-16">S</text>
</svg>
