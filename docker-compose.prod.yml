name: showbook-prod

# Production compose: built image, no source mounts, NODE_ENV=production,
# loopback-only port bindings (Cloudflare Tunnel reaches web via 127.0.0.1).
#
# Project name `showbook-prod` namespaces volumes and containers separately
# from the dev compose (project `showbook-dev`), so they have independent
# postgres data, networks, and containers.
#
# Prod postgres binds to host port 5434 (vs dev's 5433) and uses a
# distinct database name and role (`showbook_prod`) so that workspace
# scripts hardcoded to `localhost:5433/showbook` cannot accidentally
# touch prod data. The `scripts/guard-not-prod-db.mjs` check is the
# CLI-side counterpart to apps/web/app/api/test/_guard.ts.
#
# Web ports also differ from dev (host 3002 vs dev's 3001), so dev and
# prod stacks can run side-by-side. The Cloudflare Tunnel ingress for
# the prod hostname must point at http://localhost:3002. NEXTAUTH_URL
# in .env.prod should be the tunnel hostname for real prod, or
# https://localhost:3002 if testing prod auth locally.
#
#   docker compose -f docker-compose.prod.yml up -d  # start prod alongside dev
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Required env (in .env.prod):
#   POSTGRES_PASSWORD       Strong unique password for the showbook_prod role.
#   AUTH_SECRET             `openssl rand -base64 48`
#   NEXTAUTH_URL            https://<your-tunnel-hostname>
#   AUTH_ALLOWED_EMAILS     and/or AUTH_ALLOWED_DOMAINS — leaving both unset
#                           opens sign-up to anyone with a Google account.
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   plus any data-source / R2 / observability keys actually used.

services:
  db:
    image: postgres:16-alpine
    container_name: showbook-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: showbook_prod
      POSTGRES_USER: showbook_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - showbook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showbook_prod -d showbook_prod"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
    container_name: showbook-prod-web
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://showbook_prod:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}@db:5432/showbook_prod
      PORT: "3001"
      NODE_OPTIONS: "--max-old-space-size=4096"
    ports:
      - "127.0.0.1:3002:3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  showbook_pgdata:
